<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🍅 番茄鐘 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 16px 20px; display: flex; flex-direction: column; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 15px; margin-bottom: 12px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.15); transition: background 0.2s; margin-right: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .header-count {
      background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 13px;
    }

    .main { flex: 1; display: flex; gap: 20px; align-items: center; }

    /* 计时器 */
    .timer-section { flex: 1; display: flex; justify-content: center; align-items: center; }
    .timer-circle {
      width: 240px; height: 240px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.2);
      display: flex; justify-content: center; align-items: center;
      position: relative; backdrop-filter: blur(5px);
    }
    .timer-display { font-size: 56px; font-weight: bold; color: #fff; }
    .timer-label {
      position: absolute; bottom: 55px; font-size: 12px;
      color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 2px;
    }

    /* 右侧控制 */
    .control-section { flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); padding: 14px;
    }
    .card label { font-size: 13px; color: rgba(255,255,255,0.7); display: block; margin-bottom: 6px; }
    .card input[type="number"], .card input[type="text"] {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; color: #fff; font-size: 15px; outline: none;
    }
    .card input::placeholder { color: rgba(255,255,255,0.4); }
    .card input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.18); }

    .button-group { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 10px;
      font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-start {
      background: rgba(74,222,128,0.3); color: #4ade80; border: 1px solid rgba(74,222,128,0.4);
    }
    .btn-start:hover { background: rgba(74,222,128,0.4); }
    .btn-start.running {
      background: rgba(251,191,36,0.3); color: #fbbf24; border-color: rgba(251,191,36,0.4);
    }
    .btn-reset {
      background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3);
    }
    .btn-reset:hover { background: rgba(248,113,113,0.3); }
    .btn-skip {
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-skip:hover { background: rgba(255,255,255,0.2); }

    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 15px; margin-top: 12px;
      background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 7px; height: 7px; background: #ddd; border-radius: 50%;
    }
    .status-dot.running { background: #4ade80; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        🍅 番茄鐘
      </h1>
      <div class="header-count">今日完成：<span id="pomodoroCount">0</span> 個</div>
    </div>

    <div class="main">
      <div class="timer-section">
        <div class="timer-circle">
          <div class="timer-display" id="timer">25:00</div>
          <div class="timer-label" id="phaseLabel">FOCUS</div>
        </div>
      </div>

      <div class="control-section">
        <div class="card">
          <label>預設時間（分鐘）</label>
          <input type="number" id="presetTime" value="25" min="1" max="60">
        </div>
        <div class="card">
          <label>任務名稱</label>
          <input type="text" id="taskName" placeholder="輸入當前任務...">
        </div>
        <div class="button-group">
          <button class="btn btn-start" id="startBtn">▶ 開始</button>
          <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
          <button class="btn btn-skip" id="skipBtn">⏭ 跳過</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">準備開始</span>
      </div>
      <div id="taskDisplay">-</div>
    </div>
  </div>

  <script>
    let timeLeft = 25 * 60, totalTime = 25 * 60, isRunning = false, timerId = null, pomodoroCount = 0, isWorkPhase = true;
    const timerDisplay = document.getElementById('timer'), startBtn = document.getElementById('startBtn'),
      resetBtn = document.getElementById('resetBtn'), skipBtn = document.getElementById('skipBtn'),
      presetTimeInput = document.getElementById('presetTime'), taskNameInput = document.getElementById('taskName'),
      statusText = document.getElementById('statusText'), statusDot = document.getElementById('statusDot'),
      pomodoroCountDisplay = document.getElementById('pomodoroCount'), phaseLabel = document.getElementById('phaseLabel'),
      taskDisplay = document.getElementById('taskDisplay');

    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateDisplay() { timerDisplay.textContent = formatTime(timeLeft); }
    function updateTaskDisplay() { taskDisplay.textContent = taskNameInput.value.trim() || '-'; }

    function toggleTimer() {
      if (isRunning) {
        clearInterval(timerId); startBtn.innerHTML = '▶ 開始'; startBtn.classList.remove('running');
        statusText.textContent = '已暫停'; statusDot.classList.remove('running'); phaseLabel.textContent = 'PAUSED';
      } else {
        const m = parseInt(presetTimeInput.value) || 25;
        if (timeLeft === 0) { timeLeft = m * 60; totalTime = timeLeft; }
        timerId = setInterval(() => { timeLeft--; updateDisplay(); if (timeLeft <= 0) { clearInterval(timerId); timerComplete(); } }, 1000);
        startBtn.innerHTML = '⏸ 暫停'; startBtn.classList.add('running');
        statusText.textContent = isWorkPhase ? '專注中...' : '休息中...';
        statusDot.classList.add('running'); phaseLabel.textContent = isWorkPhase ? 'FOCUS' : 'BREAK';
        updateTaskDisplay();
      }
      isRunning = !isRunning;
    }

    function timerComplete() {
      isRunning = false; startBtn.innerHTML = '▶ 開始'; startBtn.classList.remove('running'); statusDot.classList.remove('running');
      if (isWorkPhase) {
        pomodoroCount++; pomodoroCountDisplay.textContent = pomodoroCount;
        statusText.textContent = '✅ 完成！'; phaseLabel.textContent = 'DONE';
        playSound();
        setTimeout(() => { if (confirm('🎉 番茄完成！開始 5 分鐘休息嗎？')) { isWorkPhase = false; timeLeft = 5*60; totalTime = timeLeft; updateDisplay(); } }, 500);
      } else { statusText.textContent = '休息結束'; phaseLabel.textContent = 'READY'; playSound(); }
    }

    function resetTimer() {
      clearInterval(timerId); isRunning = false; const m = parseInt(presetTimeInput.value) || 25;
      timeLeft = m * 60; totalTime = timeLeft; updateDisplay();
      startBtn.innerHTML = '▶ 開始'; startBtn.classList.remove('running');
      statusText.textContent = '準備開始'; statusDot.classList.remove('running'); phaseLabel.textContent = 'READY';
    }

    function skipTimer() {
      clearInterval(timerId); isRunning = false;
      if (isWorkPhase) { if (confirm('確定跳過？')) { isWorkPhase = false; timeLeft = 5*60; totalTime = timeLeft; } }
      else { isWorkPhase = true; const m = parseInt(presetTimeInput.value) || 25; timeLeft = m*60; totalTime = timeLeft; statusText.textContent = '準備下一個番茄'; phaseLabel.textContent = 'READY'; }
      startBtn.innerHTML = '▶ 開始'; startBtn.classList.remove('running'); statusDot.classList.remove('running'); updateDisplay();
    }

    function playSound() {
      try { const a = new AudioContext(), o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = 800; g.gain.setValueAtTime(0.3, a.currentTime); o.start(a.currentTime); o.stop(a.currentTime + 0.5); } catch(e){}
    }

    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    skipBtn.addEventListener('click', skipTimer);
    taskNameInput.addEventListener('input', updateTaskDisplay);
    presetTimeInput.addEventListener('change', () => { if (!isRunning) { timeLeft = (parseInt(presetTimeInput.value)||25)*60; totalTime = timeLeft; updateDisplay(); } });
    updateDisplay();
  </script>
</body>
</html>
