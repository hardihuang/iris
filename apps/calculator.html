<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🔢 計算器 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 16px 20px; display: flex; flex-direction: column; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 15px; margin-bottom: 12px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.15); transition: background 0.2s; margin-right: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .history-toggle {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; padding: 6px 12px; color: rgba(255,255,255,0.8);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .history-toggle:hover { background: rgba(255,255,255,0.25); }

    .main { flex: 1; display: flex; gap: 15px; overflow: hidden; }

    /* 计算器主体 */
    .calculator {
      flex: 1; display: flex; flex-direction: column; gap: 12px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); padding: 15px;
    }

    .display {
      background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px 20px;
      text-align: right; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end;
    }
    .display-expression { font-size: 14px; color: rgba(255,255,255,0.5); min-height: 20px; }
    .display-result { font-size: 42px; font-weight: bold; font-family: 'Courier New', monospace; }

    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1; }
    .btn {
      border: none; border-radius: 10px; font-size: 22px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; display: flex; justify-content: center; align-items: center;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-number { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .btn-number:hover { background: rgba(255,255,255,0.2); }
    .btn-operator { background: rgba(168,85,247,0.4); color: #e9d5ff; border: 1px solid rgba(168,85,247,0.5); }
    .btn-operator:hover { background: rgba(168,85,247,0.55); }
    .btn-function { background: rgba(251,191,36,0.25); color: #fcd34d; border: 1px solid rgba(251,191,36,0.35); }
    .btn-function:hover { background: rgba(251,191,36,0.35); }
    .btn-clear { background: rgba(248,113,113,0.25); color: #fca5a5; border: 1px solid rgba(248,113,113,0.35); }
    .btn-clear:hover { background: rgba(248,113,113,0.35); }
    .btn-equal { background: rgba(74,222,128,0.3); color: #86efac; border: 1px solid rgba(74,222,128,0.4); }
    .btn-equal:hover { background: rgba(74,222,128,0.4); }
    .btn-zero { grid-column: span 2; }

    /* 历史 */
    .history-panel {
      width: 220px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); padding: 14px;
      display: flex; flex-direction: column;
    }
    .history-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: rgba(255,255,255,0.7); }
    .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .history-item {
      padding: 8px 10px; background: rgba(255,255,255,0.08); border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.15); }
    .history-expr { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
    .history-result { font-size: 15px; font-weight: 600; font-family: 'Courier New', monospace; }
    .history-empty { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; padding: 30px 0; }
    .clear-history {
      margin-top: 8px; padding: 8px; border: none;
      background: rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.6);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .clear-history:hover { background: rgba(255,255,255,0.2); }

    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 15px; margin-top: 12px;
      background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        🔢 計算器
      </h1>
      <button class="history-toggle" id="historyToggle">📜 歷史記錄</button>
    </div>

    <div class="main">
      <div class="calculator">
        <div class="display">
          <div class="display-expression" id="expression"></div>
          <div class="display-result" id="result">0</div>
        </div>
        <div class="buttons">
          <button class="btn btn-clear" data-action="clear">AC</button>
          <button class="btn btn-function" data-action="delete">⌫</button>
          <button class="btn btn-operator" data-action="operator" data-value="/">÷</button>
          <button class="btn btn-operator" data-action="operator" data-value="*">×</button>
          <button class="btn btn-number" data-action="number" data-value="7">7</button>
          <button class="btn btn-number" data-action="number" data-value="8">8</button>
          <button class="btn btn-number" data-action="number" data-value="9">9</button>
          <button class="btn btn-operator" data-action="operator" data-value="-">−</button>
          <button class="btn btn-number" data-action="number" data-value="4">4</button>
          <button class="btn btn-number" data-action="number" data-value="5">5</button>
          <button class="btn btn-number" data-action="number" data-value="6">6</button>
          <button class="btn btn-operator" data-action="operator" data-value="+">+</button>
          <button class="btn btn-number" data-action="number" data-value="1">1</button>
          <button class="btn btn-number" data-action="number" data-value="2">2</button>
          <button class="btn btn-number" data-action="number" data-value="3">3</button>
          <button class="btn btn-equal" data-action="calculate">=</button>
          <button class="btn btn-number btn-zero" data-action="number" data-value="0">0</button>
          <button class="btn btn-number" data-action="decimal" data-value=".">.</button>
          <button class="btn btn-function" data-action="percent">%</button>
        </div>
      </div>

      <div class="history-panel hidden" id="historyPanel">
        <div class="history-title">📜 計算歷史</div>
        <div class="history-list" id="historyList"><div class="history-empty">暫無記錄</div></div>
        <button class="clear-history hidden" id="clearHistory">清空歷史</button>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left"><div class="status-dot"></div><span>Echo AI 驅動</span></div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    let currentValue='0',previousValue='',operator='',shouldResetScreen=false,history=[];
    const expressionEl=document.getElementById('expression'),resultEl=document.getElementById('result'),
      historyPanel=document.getElementById('historyPanel'),historyList=document.getElementById('historyList'),
      clearHistoryBtn=document.getElementById('clearHistory');
    const opSymbols={'+':'+','-':'−','*':'×','/':'÷'};

    function updateDisplay(){
      resultEl.textContent=currentValue;
      expressionEl.textContent=previousValue&&operator?`${previousValue} ${opSymbols[operator]||operator}`:'';
    }
    function appendNumber(n){if(shouldResetScreen){currentValue=n;shouldResetScreen=false;}else{currentValue=currentValue==='0'?n:currentValue+n;}updateDisplay();}
    function appendDecimal(){if(shouldResetScreen){currentValue='0.';shouldResetScreen=false;}else if(!currentValue.includes('.')){currentValue+='.';}updateDisplay();}
    function chooseOperator(op){if(operator!==''&&!shouldResetScreen)calculate();previousValue=currentValue;operator=op;shouldResetScreen=true;updateDisplay();}
    function calculate(){
      if(operator===''||previousValue==='')return;
      const p=parseFloat(previousValue),c=parseFloat(currentValue);let r;
      switch(operator){case'+':r=p+c;break;case'-':r=p-c;break;case'*':r=p*c;break;case'/':r=c===0?'Error':p/c;break;default:return;}
      addToHistory(`${previousValue} ${opSymbols[operator]} ${currentValue}`,r);
      currentValue=r.toString();operator='';previousValue='';shouldResetScreen=true;updateDisplay();
    }
    function clear(){currentValue='0';previousValue='';operator='';shouldResetScreen=false;updateDisplay();}
    function deleteLast(){currentValue=currentValue.length===1?'0':currentValue.slice(0,-1);updateDisplay();}
    function percent(){currentValue=(parseFloat(currentValue)/100).toString();updateDisplay();}
    function addToHistory(expr,result){if(result==='Error')return;history.unshift({expr,result:result.toString()});if(history.length>20)history.pop();updateHistoryDisplay();}
    function updateHistoryDisplay(){
      if(!history.length){historyList.innerHTML='<div class="history-empty">暫無記錄</div>';clearHistoryBtn.classList.add('hidden');return;}
      historyList.innerHTML=history.map((item,i)=>`<div class="history-item" data-index="${i}"><div class="history-expr">${item.expr} =</div><div class="history-result">${item.result}</div></div>`).join('');
      clearHistoryBtn.classList.remove('hidden');
      historyList.querySelectorAll('.history-item').forEach(el=>{el.addEventListener('click',()=>{currentValue=history[parseInt(el.dataset.index)].result;shouldResetScreen=true;updateDisplay();});});
    }

    document.querySelectorAll('.btn').forEach(btn=>{btn.addEventListener('click',()=>{
      const a=btn.dataset.action,v=btn.dataset.value;
      switch(a){case'number':appendNumber(v);break;case'operator':chooseOperator(v);break;case'decimal':appendDecimal();break;case'calculate':calculate();break;case'clear':clear();break;case'delete':deleteLast();break;case'percent':percent();break;}
    });});
    document.getElementById('historyToggle').addEventListener('click',()=>historyPanel.classList.toggle('hidden'));
    document.getElementById('clearHistory').addEventListener('click',()=>{history=[];updateHistoryDisplay();});
    document.addEventListener('keydown',e=>{if(e.key>='0'&&e.key<='9')appendNumber(e.key);else if(e.key==='.')appendDecimal();else if('+-*/'.includes(e.key))chooseOperator(e.key);else if(e.key==='Enter'||e.key==='=')calculate();else if(e.key==='Escape')clear();else if(e.key==='Backspace')deleteLast();else if(e.key==='%')percent();});

    function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
    updateClock();setInterval(updateClock,1000);updateDisplay();
  </script>
</body>
</html>
