<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📅 日历</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      width: 800px;
      height: 480px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      height: 100%;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8eaed;
      margin-bottom: 20px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f0f0f0;
      border-radius: 8px;
      color: #666;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .back-btn:hover { background: #e0e0e0; color: #f5576c; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 20px; font-weight: 600; color: #333; }
    .header-nav { display: flex; align-items: center; gap: 15px; }
    .nav-btn {
      padding: 8px 16px;
      border: none;
      background: #f0f0f0;
      border-radius: 8px;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav-btn:hover { background: #e0e0e0; }
    .current-month { font-size: 18px; font-weight: 600; color: #333; min-width: 120px; text-align: center; }
    .today-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
    .main-content { flex: 1; display: flex; gap: 20px; }
    .calendar-section { flex: 1; display: flex; flex-direction: column; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 10px; }
    .weekday { text-align: center; font-size: 14px; font-weight: 600; color: #666; padding: 10px; }
    .weekday.weekend { color: #f5576c; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; }
    .day-cell {
      background: #fafbfc;
      border: 2px solid #e8eaed;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 50px;
    }
    .day-cell:hover { border-color: #f5576c; background: white; }
    .day-cell.other-month { opacity: 0.3; }
    .day-cell.today { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-color: transparent; color: white; }
    .day-cell.today .day-number { color: white; }
    .day-cell.selected { border-color: #f5576c; background: rgba(245, 87, 108, 0.1); }
    .day-number { font-size: 16px; font-weight: 600; color: #333; }
    .day-cell.weekend .day-number { color: #f5576c; }
    .event-dots { display: flex; gap: 3px; margin-top: 4px; }
    .event-dot { width: 6px; height: 6px; border-radius: 50%; background: #f5576c; }
    .events-section {
      width: 250px;
      background: #fafbfc;
      border: 2px solid #e8eaed;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    .events-header { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #e8eaed; }
    .selected-date { font-size: 14px; color: #f5576c; margin-bottom: 10px; }
    .events-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .event-item { background: white; border: 1px solid #e8eaed; border-radius: 8px; padding: 10px; cursor: pointer; transition: all 0.3s; }
    .event-item:hover { border-color: #f5576c; }
    .event-time { font-size: 12px; color: #f5576c; font-weight: 600; margin-bottom: 4px; }
    .event-title { font-size: 14px; color: #333; }
    .no-events { text-align: center; color: #999; font-size: 14px; padding: 40px 0; }
    .add-event-btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .add-event-btn:hover { box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3); }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal { background: white; border-radius: 16px; padding: 25px; width: 350px; }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #333; }
    .modal-input { width: 100%; padding: 12px; border: 2px solid #e8eaed; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
    .modal-input:focus { outline: none; border-color: #f5576c; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
    .modal-btn-primary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
    .modal-btn-secondary { background: #f0f0f0; color: #666; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="back-btn">← 桌面</a>
        <span class="header-icon">📅</span>
        <span class="header-title">日历</span>
      </div>
      <div class="header-nav">
        <button class="nav-btn" id="prevMonth">←</button>
        <div class="current-month" id="currentMonth">2026年4月</div>
        <button class="nav-btn" id="nextMonth">→</button>
        <button class="nav-btn today-btn" id="todayBtn">今天</button>
      </div>
    </div>
    <div class="main-content">
      <div class="calendar-section">
        <div class="weekdays">
          <div class="weekday">一</div>
          <div class="weekday">二</div>
          <div class="weekday">三</div>
          <div class="weekday">四</div>
          <div class="weekday">五</div>
          <div class="weekday weekend">六</div>
          <div class="weekday weekend">日</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
      <div class="events-section">
        <div class="events-header">📋 事件</div>
        <div class="selected-date" id="selectedDate">请选择日期</div>
        <div class="events-list" id="eventsList"><div class="no-events">暂无事件</div></div>
        <button class="add-event-btn" id="addEventBtn">+ 添加事件</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay hidden" id="eventModal">
    <div class="modal">
      <div class="modal-title">添加事件</div>
      <input type="text" class="modal-input" id="eventTitle" placeholder="事件标题">
      <input type="time" class="modal-input" id="eventTime">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" id="cancelBtn">取消</button>
        <button class="modal-btn modal-btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>
  <script>
    let currentDate = new Date();
    let selectedDate = new Date();
    let events = JSON.parse(localStorage.getItem('calendar_events')) || {};
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('currentMonth').textContent = year + '年' + monthNames[month];
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      let startDay = firstDay.getDay();
      if (startDay === 0) startDay = 7;
      const prevMonthLastDay = new Date(year, month, 0).getDate();
      for (let i = startDay - 1; i > 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = '<div class="day-number">' + (prevMonthLastDay - i + 1) + '</div>';
        grid.appendChild(cell);
      }
      for (let day = 1; day <= lastDay.getDate(); day++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        const date = new Date(year, month, day);
        const today = new Date();
        if (date.toDateString() === today.toDateString()) cell.classList.add('today');
        if (date.toDateString() === selectedDate.toDateString()) cell.classList.add('selected');
        if (date.getDay() === 0 || date.getDay() === 6) cell.classList.add('weekend');
        let html = '<div class="day-number">' + day + '</div>';
        if (events[dateStr] && events[dateStr].length > 0) {
          html += '<div class="event-dots">';
          events[dateStr].forEach(() => html += '<div class="event-dot"></div>');
          html += '</div>';
        }
        cell.innerHTML = html;
        cell.onclick = () => { selectedDate = date; renderCalendar(); renderEvents(); };
        grid.appendChild(cell);
      }
      const totalCells = grid.children.length;
      for (let day = 1; day <= 42 - totalCells; day++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = '<div class="day-number">' + day + '</div>';
        grid.appendChild(cell);
      }
    }
    
    function renderEvents() {
      const dateStr = selectedDate.getFullYear() + '-' + String(selectedDate.getMonth() + 1).padStart(2, '0') + '-' + String(selectedDate.getDate()).padStart(2, '0');
      document.getElementById('selectedDate').textContent = dateStr;
      const list = document.getElementById('eventsList');
      const dayEvents = events[dateStr] || [];
      if (dayEvents.length === 0) {
        list.innerHTML = '<div class="no-events">暂无事件</div>';
      } else {
        list.innerHTML = dayEvents.map(e => '<div class="event-item"><div class="event-time">' + e.time + '</div><div class="event-title">' + e.title + '</div></div>').join('');
      }
    }
    
    document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
    document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };
    document.getElementById('todayBtn').onclick = () => { currentDate = new Date(); selectedDate = new Date(); renderCalendar(); renderEvents(); };
    document.getElementById('addEventBtn').onclick = () => document.getElementById('eventModal').classList.remove('hidden');
    document.getElementById('cancelBtn').onclick = () => document.getElementById('eventModal').classList.add('hidden');
    document.getElementById('saveBtn').onclick = () => {
      const title = document.getElementById('eventTitle').value.trim();
      const time = document.getElementById('eventTime').value;
      if (!title) return alert('请输入事件标题');
      const dateStr = selectedDate.getFullYear() + '-' + String(selectedDate.getMonth() + 1).padStart(2, '0') + '-' + String(selectedDate.getDate()).padStart(2, '0');
      if (!events[dateStr]) events[dateStr] = [];
      events[dateStr].push({ title, time });
      events[dateStr].sort((a, b) => a.time.localeCompare(b.time));
      localStorage.setItem('calendar_events', JSON.stringify(events));
      renderCalendar();
      renderEvents();
      document.getElementById('eventModal').classList.add('hidden');
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventTime').value = '';
    };
    
    renderCalendar();
    renderEvents();
  </script>
</body>
</html>
