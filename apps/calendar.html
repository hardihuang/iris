<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>📅 日曆 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 16px 20px; display: flex; flex-direction: column; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 15px; margin-bottom: 12px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.15); transition: background 0.2s; margin-right: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .header-nav { display: flex; align-items: center; gap: 10px; }
    .nav-btn {
      padding: 6px 14px; border: none;
      background: rgba(255,255,255,0.12); border-radius: 8px;
      color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.22); }
    .current-month { font-size: 16px; font-weight: 600; min-width: 110px; text-align: center; }
    .today-btn { background: rgba(74,222,128,0.25); color: #4ade80; border: 1px solid rgba(74,222,128,0.35); }
    .today-btn:hover { background: rgba(74,222,128,0.35); }
    .main { flex: 1; display: flex; gap: 14px; overflow: hidden; }
    .calendar-section {
      flex: 1; display: flex; flex-direction: column;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); padding: 14px;
    }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 8px; }
    .weekday { text-align: center; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); padding: 6px; }
    .weekday.weekend { color: rgba(248,113,113,0.8); }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; flex: 1; }
    .day-cell {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 5px; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; min-height: 42px;
    }
    .day-cell:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
    .day-cell.other-month { opacity: 0.25; }
    .day-cell.today { background: rgba(168,85,247,0.4); border-color: rgba(168,85,247,0.6); }
    .day-cell.selected { border-color: rgba(74,222,128,0.6); background: rgba(74,222,128,0.15); }
    .day-number { font-size: 14px; font-weight: 600; }
    .day-cell.weekend .day-number { color: rgba(248,113,113,0.9); }
    .day-cell.today .day-number { color: #fff; }
    .event-dots { display: flex; gap: 2px; margin-top: 3px; }
    .event-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; }
    .events-section {
      width: 200px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); padding: 14px;
      display: flex; flex-direction: column;
    }
    .events-header { font-size: 14px; font-weight: 600; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .selected-date { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
    .events-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .events-list::-webkit-scrollbar { width: 4px; }
    .events-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .event-item {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 10px; transition: all 0.2s;
    }
    .event-item:hover { background: rgba(255,255,255,0.15); }
    .event-time { font-size: 11px; color: #4ade80; font-weight: 600; margin-bottom: 3px; }
    .event-title { font-size: 13px; }
    .no-events { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; padding: 25px 0; }
    .add-event-btn {
      margin-top: 8px; padding: 10px; border: none;
      background: rgba(168,85,247,0.3); border: 1px solid rgba(168,85,247,0.4);
      border-radius: 8px; color: #e9d5ff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .add-event-btn:hover { background: rgba(168,85,247,0.45); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; justify-content: center;
      align-items: center; z-index: 100;
    }
    .modal {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 14px; padding: 20px; width: 320px;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
    .modal-input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 10px; outline: none;
    }
    .modal-input::placeholder { color: rgba(255,255,255,0.4); }
    .modal-input:focus { border-color: rgba(255,255,255,0.45); }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 600;
    }
    .modal-btn-primary { background: rgba(74,222,128,0.3); color: #4ade80; border: 1px solid rgba(74,222,128,0.4); }
    .modal-btn-primary:hover { background: rgba(74,222,128,0.4); }
    .modal-btn-secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); }
    .modal-btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 15px; margin-top: 12px;
      background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        📅 日曆
      </h1>
      <div class="header-nav">
        <button class="nav-btn" id="prevMonth">←</button>
        <div class="current-month" id="currentMonth"></div>
        <button class="nav-btn" id="nextMonth">→</button>
        <button class="nav-btn today-btn" id="todayBtn">今天</button>
      </div>
    </div>
    <div class="main">
      <div class="calendar-section">
        <div class="weekdays">
          <div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div>
          <div class="weekday">四</div><div class="weekday">五</div>
          <div class="weekday weekend">六</div><div class="weekday weekend">日</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
      <div class="events-section">
        <div class="events-header">📋 事件</div>
        <div class="selected-date" id="selectedDate">請選擇日期</div>
        <div class="events-list" id="eventsList"><div class="no-events">暫無事件</div></div>
        <button class="add-event-btn" id="addEventBtn">+ 添加事件</button>
      </div>
    </div>
    <div class="footer">
      <div class="footer-left"><div class="status-dot"></div><span>Echo AI 驅動</span></div>
      <div id="clock"></div>
    </div>
  </div>
  <div class="modal-overlay hidden" id="eventModal">
    <div class="modal">
      <div class="modal-title">添加事件</div>
      <input type="text" class="modal-input" id="eventTitle" placeholder="事件標題">
      <input type="time" class="modal-input" id="eventTime">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" id="cancelBtn">取消</button>
        <button class="modal-btn modal-btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>
  <script>
    let currentDate=new Date(),selectedDate=new Date(),events=JSON.parse(localStorage.getItem('calendar_events'))||{};
    const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    function dateKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    function renderCalendar(){
      const y=currentDate.getFullYear(),m=currentDate.getMonth();
      document.getElementById('currentMonth').textContent=y+'年'+monthNames[m];
      const grid=document.getElementById('daysGrid');grid.innerHTML='';
      const lastDay=new Date(y,m+1,0);let startDay=new Date(y,m,1).getDay();if(startDay===0)startDay=7;
      const prevLast=new Date(y,m,0).getDate();
      for(let i=startDay-1;i>0;i--){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML=`<div class="day-number">${prevLast-i+1}</div>`;grid.appendChild(c);}
      for(let day=1;day<=lastDay.getDate();day++){
        const c=document.createElement('div');c.className='day-cell';const d=new Date(y,m,day),dk=dateKey(d),today=new Date();
        if(d.toDateString()===today.toDateString())c.classList.add('today');
        if(d.toDateString()===selectedDate.toDateString())c.classList.add('selected');
        if(d.getDay()===0||d.getDay()===6)c.classList.add('weekend');
        let html=`<div class="day-number">${day}</div>`;
        if(events[dk]&&events[dk].length){html+='<div class="event-dots">';events[dk].forEach(()=>html+='<div class="event-dot"></div>');html+='</div>';}
        c.innerHTML=html;c.onclick=()=>{selectedDate=d;renderCalendar();renderEvents();};grid.appendChild(c);
      }
      const total=grid.children.length;for(let d=1;d<=42-total;d++){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML=`<div class="day-number">${d}</div>`;grid.appendChild(c);}
    }
    function renderEvents(){
      const dk=dateKey(selectedDate);document.getElementById('selectedDate').textContent=dk;
      const list=document.getElementById('eventsList'),dayEvents=events[dk]||[];
      list.innerHTML=dayEvents.length?dayEvents.map(e=>`<div class="event-item"><div class="event-time">${e.time||'全天'}</div><div class="event-title">${e.title}</div></div>`).join(''):'<div class="no-events">暫無事件</div>';
    }
    document.getElementById('prevMonth').onclick=()=>{currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();};
    document.getElementById('nextMonth').onclick=()=>{currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();};
    document.getElementById('todayBtn').onclick=()=>{currentDate=new Date();selectedDate=new Date();renderCalendar();renderEvents();};
    document.getElementById('addEventBtn').onclick=()=>document.getElementById('eventModal').classList.remove('hidden');
    document.getElementById('cancelBtn').onclick=()=>document.getElementById('eventModal').classList.add('hidden');
    document.getElementById('saveBtn').onclick=()=>{
      const title=document.getElementById('eventTitle').value.trim(),time=document.getElementById('eventTime').value;
      if(!title)return alert('請輸入事件標題');const dk=dateKey(selectedDate);
      if(!events[dk])events[dk]=[];events[dk].push({title,time});events[dk].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      localStorage.setItem('calendar_events',JSON.stringify(events));renderCalendar();renderEvents();
      document.getElementById('eventModal').classList.add('hidden');document.getElementById('eventTitle').value='';document.getElementById('eventTime').value='';
    };
    function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
    renderCalendar();renderEvents();updateClock();setInterval(updateClock,1000);
  </script>
</body>
</html>
