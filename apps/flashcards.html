<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>📖 單詞卡片 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 16px 20px; display: flex; flex-direction: column; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 15px; margin-bottom: 12px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.15); transition: background 0.2s; margin-right: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .header-stats { display: flex; gap: 15px; font-size: 13px; }
    .stat-item { display: flex; align-items: center; gap: 5px; }
    .stat-value { font-weight: 700; color: #4ade80; }

    .main { flex: 1; display: flex; align-items: center; gap: 25px; padding: 0 10px; }

    /* 卡片 */
    .card-area { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .card-container { position: relative; width: 360px; height: 230px; perspective: 1000px; }
    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      border-radius: 14px; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 25px;
    }
    .card-front {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
    }
    .card-back {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      transform: rotateY(180deg);
    }
    .word-text { font-size: 36px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .word-phonetic { font-size: 15px; color: rgba(255,255,255,0.7); font-family: 'Courier New', monospace; }
    .speak-btn {
      width: 38px; height: 38px; border: none;
      background: rgba(255,255,255,0.2); border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all 0.2s; color: #fff;
    }
    .speak-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }
    .word-meaning { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
    .word-example { font-size: 14px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.6; }
    .flip-hint { position: absolute; bottom: 14px; font-size: 12px; color: rgba(255,255,255,0.5); }

    .progress-bar { width: 360px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #a855f7); border-radius: 3px; transition: width 0.3s; }
    .progress-text { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 5px; }

    /* 右侧 */
    .right-panel { display: flex; flex-direction: column; gap: 10px; }
    .rate-btns { display: flex; flex-direction: column; gap: 8px; }
    .rate-btn {
      padding: 12px 30px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; min-width: 130px;
    }
    .rate-btn:hover { transform: translateY(-1px); }
    .btn-hard { background: rgba(248,113,113,0.25); color: #fca5a5; border: 1px solid rgba(248,113,113,0.35); }
    .btn-hard:hover { background: rgba(248,113,113,0.35); }
    .btn-good { background: rgba(251,191,36,0.25); color: #fcd34d; border: 1px solid rgba(251,191,36,0.35); }
    .btn-good:hover { background: rgba(251,191,36,0.35); }
    .btn-easy { background: rgba(74,222,128,0.25); color: #86efac; border: 1px solid rgba(74,222,128,0.35); }
    .btn-easy:hover { background: rgba(74,222,128,0.35); }
    .btn-next { background: rgba(168,85,247,0.35); color: #e9d5ff; border: 1px solid rgba(168,85,247,0.45); }
    .btn-next:hover { background: rgba(168,85,247,0.5); }

    .tool-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
    .tool-btn {
      padding: 10px 16px; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      color: rgba(255,255,255,0.8); font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.2); }

    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 15px; margin-top: 12px;
      background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        📖 單詞卡片
      </h1>
      <div class="header-stats">
        <div class="stat-item">今日學習: <span class="stat-value" id="todayCount">0</span></div>
        <div class="stat-item">已掌握: <span class="stat-value" id="masteredCount">0</span></div>
      </div>
    </div>

    <div class="main">
      <div class="card-area">
        <div class="card-container">
          <div class="card" id="card">
            <div class="card-face card-front">
              <div class="word-text">
                <span id="wordText">Hello</span>
                <button class="speak-btn" id="speakBtn" title="點擊發音">🔊</button>
              </div>
              <div class="word-phonetic" id="wordPhonetic">/həˈloʊ/</div>
              <div class="flip-hint">點擊翻轉查看釋義</div>
            </div>
            <div class="card-face card-back">
              <div class="word-meaning" id="wordMeaning">你好</div>
              <div class="word-example" id="wordExample">Hello, how are you?</div>
            </div>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text"><span id="currentIndex">1</span> / <span id="totalCount">10</span></div>
      </div>

      <div class="right-panel">
        <div class="rate-btns" id="controls">
          <button class="rate-btn btn-hard" id="btnHard">😰 困難</button>
          <button class="rate-btn btn-good" id="btnGood">🤔 一般</button>
          <button class="rate-btn btn-easy" id="btnEasy">😎 簡單</button>
        </div>
        <div class="rate-btns hidden" id="nextControl">
          <button class="rate-btn btn-next" id="btnNext">下一個 →</button>
        </div>
        <div class="tool-btns">
          <button class="tool-btn" id="btnShuffle">🔀 隨機</button>
          <button class="tool-btn" id="btnReset">🔄 重置</button>
          <button class="tool-btn" id="btnAdd">➕ 添加</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left"><div class="status-dot"></div><span>Echo AI 驅動</span></div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    const defaultWords = [
      { word:'Hello', phonetic:'/həˈloʊ/', meaning:'你好', example:'Hello, how are you?' },
      { word:'World', phonetic:'/wɜːrld/', meaning:'世界', example:'The world is beautiful.' },
      { word:'Study', phonetic:'/ˈstʌdi/', meaning:'學習', example:'I study English every day.' },
      { word:'Computer', phonetic:'/kəmˈpjuːtər/', meaning:'電腦', example:'I use a computer for work.' },
      { word:'Science', phonetic:'/ˈsaɪəns/', meaning:'科學', example:'Science helps us understand the world.' },
      { word:'Dream', phonetic:'/driːm/', meaning:'夢想', example:'Never give up on your dreams.' },
      { word:'Future', phonetic:'/ˈfjuːtʃər/', meaning:'未來', example:'The future is full of possibilities.' },
      { word:'Knowledge', phonetic:'/ˈnɒlɪdʒ/', meaning:'知識', example:'Knowledge is power.' },
      { word:'Challenge', phonetic:'/ˈtʃælɪndʒ/', meaning:'挑戰', example:'Every challenge is an opportunity.' },
      { word:'Success', phonetic:'/səkˈses/', meaning:'成功', example:'Hard work leads to success.' }
    ];

    let words=[...defaultWords],currentIndex=0,isFlipped=false,todayCount=0,masteredCount=0,wordStatus={};
    const card=document.getElementById('card'),wordText=document.getElementById('wordText'),
      wordPhonetic=document.getElementById('wordPhonetic'),wordMeaning=document.getElementById('wordMeaning'),
      wordExample=document.getElementById('wordExample'),progressFill=document.getElementById('progressFill'),
      currentIndexEl=document.getElementById('currentIndex'),totalCountEl=document.getElementById('totalCount'),
      todayCountEl=document.getElementById('todayCount'),masteredCountEl=document.getElementById('masteredCount'),
      controls=document.getElementById('controls'),nextControl=document.getElementById('nextControl');

    function showCard(){
      const w=words[currentIndex];
      wordText.textContent=w.word;wordPhonetic.textContent=w.phonetic;
      wordMeaning.textContent=w.meaning;wordExample.textContent=w.example;
      isFlipped=false;card.classList.remove('flipped');
      controls.classList.remove('hidden');nextControl.classList.add('hidden');
    }
    function flipCard(){isFlipped=!isFlipped;card.classList.toggle('flipped');}
    function updateProgress(){
      progressFill.style.width=((currentIndex+1)/words.length*100)+'%';
      currentIndexEl.textContent=currentIndex+1;totalCountEl.textContent=words.length;
    }
    function rateWord(d){
      wordStatus[words[currentIndex].word]=d;todayCount++;
      if(d==='easy')masteredCount++;
      todayCountEl.textContent=todayCount;masteredCountEl.textContent=masteredCount;
      controls.classList.add('hidden');nextControl.classList.remove('hidden');
    }
    function nextWord(){
      currentIndex++;if(currentIndex>=words.length){currentIndex=0;alert('🎉 本輪學習完成！繼續加油～');}
      showCard();updateProgress();
    }
    function shuffleWords(){
      for(let i=words.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[words[i],words[j]]=[words[j],words[i]];}
      currentIndex=0;showCard();updateProgress();
    }
    function speakWord(){
      if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(words[currentIndex].word);u.lang='en-US';u.rate=0.9;
        window.speechSynthesis.speak(u);
      }
    }

    card.addEventListener('click',e=>{if(e.target.id!=='speakBtn')flipCard();});
    document.getElementById('speakBtn').addEventListener('click',e=>{e.stopPropagation();speakWord();});
    document.getElementById('btnHard').addEventListener('click',()=>rateWord('hard'));
    document.getElementById('btnGood').addEventListener('click',()=>rateWord('good'));
    document.getElementById('btnEasy').addEventListener('click',()=>rateWord('easy'));
    document.getElementById('btnNext').addEventListener('click',nextWord);
    document.getElementById('btnShuffle').addEventListener('click',shuffleWords);
    document.getElementById('btnReset').addEventListener('click',()=>{currentIndex=0;wordStatus={};showCard();updateProgress();});
    document.getElementById('btnAdd').addEventListener('click',()=>{
      const w=prompt('請輸入單詞:');if(!w)return;
      const p=prompt('音標 (可選):')||'';const m=prompt('釋義:');if(!m)return;
      const ex=prompt('例句 (可選):')||'';
      words.push({word:w,phonetic:p,meaning:m,example:ex});totalCountEl.textContent=words.length;
    });
    document.addEventListener('keydown',e=>{
      if(e.code==='Space'){e.preventDefault();flipCard();}
      else if(e.code==='ArrowRight')nextWord();
    });

    function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
    shuffleWords();updateClock();setInterval(updateClock,1000);
  </script>
</body>
</html>
