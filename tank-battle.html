<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人坦克大战 - Echo × Iris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            color: #a0a0b0;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .player-score {
            text-align: center;
        }

        .player-score h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .player-score .score {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .player1 .score { color: #4facfe; }
        .player2 .score { color: #f5576c; }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: #0a0a15;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 20px auto;
            gap: 20px;
        }

        .control-panel {
            flex: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-panel h4 {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .control-panel.player1 h4 { color: #4facfe; }
        .control-panel.player2 h4 { color: #f5576c; }

        .key {
            display: inline-block;
            padding: 8px 15px;
            margin: 3px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            font-size: 0.9rem;
            min-width: 40px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🦞 双人坦克大战 🦞</h1>
        <p class="subtitle">Echo × Iris 特别版 - 龙虾出品</p>

        <div class="scoreboard">
            <div class="player-score player1">
                <h3>🔵 玩家 1</h3>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player-score player2">
                <h3>🔴 玩家 2</h3>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <div class="control-panel player1">
                <h4>🔵 玩家 1 控制</h4>
                <div>
                    <span class="key">W</span> 上
                    <span class="key">S</span> 下
                    <span class="key">A</span> 左
                    <span class="key">D</span> 右
                </div>
                <div style="margin-top: 10px;">
                    <span class="key">空格</span> 射击
                </div>
            </div>
            <div class="control-panel player2">
                <h4>🔴 玩家 2 控制</h4>
                <div>
                    <span class="key">↑</span> 上
                    <span class="key">↓</span> 下
                    <span class="key">←</span> 左
                    <span class="key">→</span> 右
                </div>
                <div style="margin-top: 10px;">
                    <span class="key">Enter</span> 射击
                </div>
            </div>
        </div>

        <div>
            <button class="btn btn-start" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn btn-reset" onclick="resetGame()">🔄 重置游戏</button>
        </div>

        <div class="footer">
            <p>Made with 🦞 by Echo for Iris | <a href="https://github.com/hardihuang/iris" target="_blank">GitHub</a></p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p id="winnerText"></p>
        <button class="btn btn-start" onclick="resetGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameRunning = false;
        let score1 = 0;
        let score2 = 0;

        // 坦克类
        class Tank {
            constructor(x, y, color, controls) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.color = color;
                this.speed = 5;
                this.direction = 'up';
                this.controls = controls;
                this.bullets = [];
                this.lastShot = 0;
                this.shootDelay = 500;
                this.health = 3;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                
                // 根据方向旋转
                let angle = 0;
                if (this.direction === 'down') angle = Math.PI;
                if (this.direction === 'left') angle = -Math.PI/2;
                if (this.direction === 'right') angle = Math.PI/2;
                ctx.rotate(angle);

                // 坦克主体
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                
                // 坦克炮管
                ctx.fillStyle = '#fff';
                ctx.fillRect(-5, -this.height/2 - 10, 10, 20);
                
                // 坦克履带
                ctx.fillStyle = '#333';
                ctx.fillRect(-this.width/2 - 5, -this.height/2, 8, this.height);
                ctx.fillRect(this.width/2 - 3, -this.height/2, 8, this.height);

                ctx.restore();

                // 绘制生命值
                this.drawHealth();
            }

            drawHealth() {
                const barWidth = 50;
                const barHeight = 6;
                const x = this.x - 5;
                const y = this.y - 15;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, barWidth, barHeight);
                
                ctx.fillStyle = this.health > 1 ? '#4ade80' : '#f87171';
                ctx.fillRect(x, y, (this.health / 3) * barWidth, barHeight);
            }

            move(direction, obstacles) {
                this.direction = direction;
                let newX = this.x;
                let newY = this.y;

                if (direction === 'up') newY -= this.speed;
                if (direction === 'down') newY += this.speed;
                if (direction === 'left') newX -= this.speed;
                if (direction === 'right') newX += this.speed;

                // 边界检测
                if (newX >= 0 && newX <= canvas.width - this.width &&
                    newY >= 0 && newY <= canvas.height - this.height) {
                    // 障碍物碰撞检测
                    let collides = false;
                    for (let obs of obstacles) {
                        if (this.checkCollision({x: newX, y: newY}, obs)) {
                            collides = true;
                            break;
                        }
                    }
                    if (!collides) {
                        this.x = newX;
                        this.y = newY;
                    }
                }
            }

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + this.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + this.height > rect2.y;
            }

            shoot() {
                const now = Date.now();
                if (now - this.lastShot < this.shootDelay) return;
                
                this.lastShot = now;
                
                let bulletX = this.x + this.width/2 - 5;
                let bulletY = this.y + this.height/2 - 5;
                
                if (this.direction === 'up') bulletY = this.y - 10;
                if (this.direction === 'down') bulletY = this.y + this.height;
                if (this.direction === 'left') bulletX = this.x - 10;
                if (this.direction === 'right') bulletX = this.x + this.width;

                this.bullets.push({
                    x: bulletX,
                    y: bulletY,
                    width: 10,
                    height: 10,
                    speed: 10,
                    direction: this.direction
                });
            }

            updateBullets(obstacles, enemyTank) {
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    let bullet = this.bullets[i];
                    
                    if (bullet.direction === 'up') bullet.y -= bullet.speed;
                    if (bullet.direction === 'down') bullet.y += bullet.speed;
                    if (bullet.direction === 'left') bullet.x -= bullet.speed;
                    if (bullet.direction === 'right') bullet.x += bullet.speed;

                    // 移除出界的子弹
                    if (bullet.x < 0 || bullet.x > canvas.width || 
                        bullet.y < 0 || bullet.y > canvas.height) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // 障碍物碰撞
                    for (let obs of obstacles) {
                        if (this.checkBulletCollision(bullet, obs)) {
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }

                    // 坦克碰撞
                    if (this.checkBulletCollision(bullet, enemyTank)) {
                        enemyTank.health--;
                        this.bullets.splice(i, 1);
                        if (enemyTank.health <= 0) {
                            return true; // 击中坦克
                        }
                    }
                }
                return false;
            }

            checkBulletCollision(bullet, rect) {
                return bullet.x < rect.x + rect.width &&
                       bullet.x + bullet.width > rect.x &&
                       bullet.y < rect.y + rect.height &&
                       bullet.y + bullet.height > rect.y;
            }

            drawBullets() {
                ctx.fillStyle = '#fff';
                for (let bullet of this.bullets) {
                    ctx.beginPath();
                    ctx.arc(bullet.x + 5, bullet.y + 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 障碍物类
        class Obstacle {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
            }

            draw() {
                ctx.fillStyle = '#4a5568';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // 添加纹理
                ctx.strokeStyle = '#2d3748';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        // 初始化游戏对象
        let tank1, tank2, obstacles;

        function initGame() {
            tank1 = new Tank(100, 300, '#4facfe', {
                up: 'KeyW',
                down: 'KeyS',
                left: 'KeyA',
                right: 'KeyD',
                shoot: 'Space'
            });

            tank2 = new Tank(660, 300, '#f5576c', {
                up: 'ArrowUp',
                down: 'ArrowDown',
                left: 'ArrowLeft',
                right: 'ArrowRight',
                shoot: 'Enter'
            });

            // 创建障碍物
            obstacles = [
                new Obstacle(300, 100, 50, 150),
                new Obstacle(450, 100, 50, 150),
                new Obstacle(300, 350, 50, 150),
                new Obstacle(450, 350, 50, 150),
                new Obstacle(375, 275, 50, 50)
            ];
        }

        // 键盘状态
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 处理输入
        function handleInput() {
            if (!gameRunning) return;

            // 玩家 1
            if (keys[tank1.controls.up]) tank1.move('up', obstacles);
            if (keys[tank1.controls.down]) tank1.move('down', obstacles);
            if (keys[tank1.controls.left]) tank1.move('left', obstacles);
            if (keys[tank1.controls.right]) tank1.move('right', obstacles);
            if (keys[tank1.controls.shoot]) tank1.shoot();

            // 玩家 2
            if (keys[tank2.controls.up]) tank2.move('up', obstacles);
            if (keys[tank2.controls.down]) tank2.move('down', obstacles);
            if (keys[tank2.controls.left]) tank2.move('left', obstacles);
            if (keys[tank2.controls.right]) tank2.move('right', obstacles);
            if (keys[tank2.controls.shoot]) tank2.shoot();
        }

        // 更新游戏
        function update() {
            if (!gameRunning) return;

            // 更新子弹
            const hit1 = tank2.updateBullets(obstacles, tank1);
            const hit2 = tank1.updateBullets(obstacles, tank2);

            if (hit1) {
                score1++;
                document.getElementById('score1').textContent = score1;
                if (score1 >= 5) {
                    endGame(1);
                } else {
                    resetPositions();
                }
            }

            if (hit2) {
                score2++;
                document.getElementById('score2').textContent = score2;
                if (score2 >= 5) {
                    endGame(2);
                } else {
                    resetPositions();
                }
            }
        }

        function resetPositions() {
            tank1.x = 100;
            tank1.y = 300;
            tank1.health = 3;
            tank1.bullets = [];
            
            tank2.x = 660;
            tank2.y = 300;
            tank2.health = 3;
            tank2.bullets = [];
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制障碍物
            for (let obs of obstacles) {
                obs.draw();
            }

            // 绘制坦克
            tank1.draw();
            tank2.draw();

            // 绘制子弹
            tank1.drawBullets();
            tank2.drawBullets();
        }

        // 游戏循环
        function gameLoop() {
            handleInput();
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
        }

        // 重置游戏
        function resetGame() {
            score1 = 0;
            score2 = 0;
            document.getElementById('score1').textContent = '0';
            document.getElementById('score2').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            initGame();
            gameRunning = true;
        }

        // 结束游戏
        function endGame(winner) {
            gameRunning = false;
            const winnerText = winner === 1 ? '🔵 玩家 1 获胜!' : '🔴 玩家 2 获胜!';
            document.getElementById('winnerText').textContent = winnerText;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 初始化
        initGame();
        gameLoop();
    </script>
</body>
</html>
