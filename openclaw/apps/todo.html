<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办清单 - Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 480px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-number {
            font-weight: bold;
            color: white;
        }

        .input-section {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .todo-input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            outline: none;
        }

        .todo-input::placeholder {
            color: #999;
        }

        .priority-select, .category-select {
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .add-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .filter-section {
            padding: 10px 25px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
        }

        .filter-btn {
            padding: 8px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 25px;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .checkbox:hover {
            border-color: rgba(255, 255, 255, 0.8);
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-text {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }

        .todo-meta {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .tag.priority-high {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .tag.priority-medium {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .tag.priority-low {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .tag.category {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .action-btn.delete:hover {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 16px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #f093fb);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .due-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 8px;
        }

        .due-date.overdue {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 待办清单</h1>
            <div class="stats">
                <div class="stat-item">
                    <span>总任务:</span>
                    <span class="stat-number" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span>已完成:</span>
                    <span class="stat-number" id="completedCount">0</span>
                </div>
                <div class="stat-item">
                    <span>待完成:</span>
                    <span class="stat-number" id="pendingCount">0</span>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-row">
                <input type="text" class="todo-input" id="todoInput" placeholder="添加新任务...">
                <select class="priority-select" id="prioritySelect">
                    <option value="high">🔴 高优先级</option>
                    <option value="medium" selected>🟡 中优先级</option>
                    <option value="low">🟢 低优先级</option>
                </select>
                <select class="category-select" id="categorySelect">
                    <option value="工作">💼 工作</option>
                    <option value="学习">📚 学习</option>
                    <option value="生活">🏠 生活</option>
                    <option value="其他">📌 其他</option>
                </select>
                <button class="add-btn" id="addBtn">添加</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="active">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
            <button class="filter-btn" data-filter="high">🔴 高优先级</button>
            <button class="filter-btn" data-filter="work">💼 工作</button>
            <button class="filter-btn" data-filter="study">📚 学习</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <div class="empty-state-text">还没有任务，添加一个吧！</div>
            </div>
        </div>
    </div>

    <script>
        // 音效系统
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(frequency, duration, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playAddSound() {
            playSound(800, 0.1);
            setTimeout(() => playSound(1000, 0.15), 50);
        }

        function playCompleteSound() {
            playSound(600, 0.1);
            setTimeout(() => playSound(800, 0.1), 100);
            setTimeout(() => playSound(1200, 0.2), 200);
        }

        function playDeleteSound() {
            playSound(400, 0.1);
            setTimeout(() => playSound(300, 0.15), 50);
        }

        // 待办事项管理
        let todos = JSON.parse(localStorage.getItem('cyberdeck-todos')) || [];
        let currentFilter = 'all';

        function saveTodos() {
            localStorage.setItem('cyberdeck-todos', JSON.stringify(todos));
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;
            const progress = total > 0 ? (completed / total * 100) : 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function renderTodos() {
            const todoList = document.getElementById('todoList');
            
            let filteredTodos = todos;
            if (currentFilter === 'active') {
                filteredTodos = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(t => t.completed);
            } else if (currentFilter === 'high') {
                filteredTodos = todos.filter(t => t.priority === 'high');
            } else if (currentFilter === 'work') {
                filteredTodos = todos.filter(t => t.category === '工作');
            } else if (currentFilter === 'study') {
                filteredTodos = todos.filter(t => t.category === '学习');
            }

            if (filteredTodos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${currentFilter === 'completed' ? '✨' : '📝'}</div>
                        <div class="empty-state-text">${currentFilter === 'completed' ? '还没有已完成的任务' : '还没有任务，添加一个吧！'}</div>
                    </div>
                `;
                updateStats();
                return;
            }

            todoList.innerHTML = filteredTodos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')"></div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div class="todo-meta">
                            <span class="tag priority-${todo.priority}">${getPriorityLabel(todo.priority)}</span>
                            <span class="tag category">${todo.category}</span>
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="action-btn delete" onclick="deleteTodo('${todo.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getPriorityLabel(priority) {
            const labels = {
                high: '高',
                medium: '中',
                low: '低'
            };
            return labels[priority] || priority;
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const priority = document.getElementById('prioritySelect').value;
            const category = document.getElementById('categorySelect').value;
            const text = input.value.trim();

            if (!text) return;

            const todo = {
                id: Date.now().toString(),
                text: text,
                priority: priority,
                category: category,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.unshift(todo);
            saveTodos();
            renderTodos();
            playAddSound();
            
            input.value = '';
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                if (todo.completed) {
                    playCompleteSound();
                }
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
            playDeleteSound();
        }

        // 事件监听
        document.getElementById('addBtn').addEventListener('click', addTodo);
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTodos();
            });
        });

        // 初始化
        renderTodos();
    </script>
</body>
</html>
