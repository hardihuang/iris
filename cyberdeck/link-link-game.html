<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连连看游戏 - 触控版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 800px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 1.8rem;
        }
        
        .info-panel {
            background: rgba(255,255,255,0.9);
            padding: 10px 25px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            gap: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
        }
        
        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .game-board {
            display: grid;
            gap: 6px;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .cell {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #f0f0f0, #e0e0e0);
            border: 2px solid #ccc;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        .cell.selected {
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-color: #5a67d8;
            transform: scale(1.05);
        }
        
        .cell.matched {
            background: linear-gradient(145deg, #48bb78, #38a169);
            border-color: #2f855a;
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 25px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-restart {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-restart:active {
            transform: scale(0.95);
        }
        
        .message {
            margin-top: 10px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.9);
            border-radius: 6px;
            color: #667eea;
            font-weight: bold;
            min-height: 35px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎮 连连看</h1>
    
    <div class="info-panel">
        <div class="info-item">
            <div class="info-label">得分</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">剩余</div>
            <div class="info-value" id="remaining">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">时间</div>
            <div class="info-value" id="timer">0s</div>
        </div>
    </div>
    
    <div class="game-board" id="gameBoard"></div>
    
    <div class="controls">
        <button class="btn-restart" onclick="initGame()">🔄 重新开始</button>
    </div>
    
    <div class="message" id="message"></div>
    
    <script>
        // 游戏配置
        const ROWS = 6;
        const COLS = 8;
        const EMOJIS = ['🍎', '🍊', '🍇', '🍓', '🍑', '🍒', '🥝', '🍌', '🍍', '🥭', '🍐', '🍎'];
        
        let grid = [];
        let selected = null;
        let score = 0;
        let remaining = 0;
        let timer = 0;
        let timerInterval = null;
        let gameStarted = false;
        
        // 初始化游戏
        function initGame() {
            // 重置状态
            grid = [];
            selected = null;
            score = 0;
            timer = 0;
            gameStarted = false;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            updateInfo();
            document.getElementById('message').textContent = '';
            
            // 生成成对的图案
            const totalCells = ROWS * COLS;
            const pairs = totalCells / 2;
            let tiles = [];
            
            for (let i = 0; i < pairs; i++) {
                const emoji = EMOJIS[i % (EMOJIS.length - 1)];
                tiles.push(emoji, emoji);
            }
            
            // 洗牌
            tiles.sort(() => Math.random() - 0.5);
            
            // 填充网格
            for (let row = 0; row < ROWS; row++) {
                grid[row] = [];
                for (let col = 0; col < COLS; col++) {
                    grid[row][col] = {
                        emoji: tiles[row * COLS + col],
                        matched: false
                    };
                }
            }
            
            remaining = totalCells;
            renderBoard();
        }
        
        // 渲染游戏板
        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    if (grid[row][col].matched) {
                        cell.classList.add('matched');
                        cell.textContent = '';
                    } else {
                        cell.textContent = grid[row][col].emoji;
                        cell.onclick = () => handleCellClick(row, col);
                    }
                    
                    if (selected && selected.row === row && selected.col === col) {
                        cell.classList.add('selected');
                    }
                    
                    board.appendChild(cell);
                }
            }
        }
        
        // 处理点击
        function handleCellClick(row, col) {
            if (grid[row][col].matched) return;
            
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }
            
            if (selected && selected.row === row && selected.col === col) {
                // 取消选择
                selected = null;
            } else if (!selected) {
                // 第一次选择
                selected = { row, col };
            } else {
                // 第二次选择，检查匹配
                checkMatch(selected.row, selected.col, row, col);
                selected = null;
            }
            
            renderBoard();
        }
        
        // 检查匹配
        function checkMatch(row1, col1, row2, col2) {
            const tile1 = grid[row1][col1].emoji;
            const tile2 = grid[row2][col2].emoji;
            
            if (tile1 === tile2) {
                // 匹配成功
                grid[row1][col1].matched = true;
                grid[row2][col2].matched = true;
                remaining -= 2;
                score += 10;
                document.getElementById('message').textContent = '✅ 匹配成功！';
                
                if (remaining === 0) {
                    clearInterval(timerInterval);
                    document.getElementById('message').textContent = `🎉 恭喜通关！得分：${score} 用时：${timer}秒`;
                }
            } else {
                // 匹配失败
                score = Math.max(0, score - 5);
                document.getElementById('message').textContent = '❌ 不匹配，扣 5 分';
            }
            
            updateInfo();
        }
        
        // 更新信息面板
        function updateInfo() {
            document.getElementById('score').textContent = score;
            document.getElementById('remaining').textContent = remaining;
            document.getElementById('timer').textContent = timer + 's';
        }
        
        // 开始计时
        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = timer + 's';
            }, 1000);
        }
        
        // 启动游戏
        initGame();
    </script>
</body>
</html>
