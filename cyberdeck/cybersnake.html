<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🐍 CyberSnake - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 12px 16px; display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; margin-bottom: 10px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
      padding: 6px 14px; border-radius: 6px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .app-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    .app-title span { color: #4ade80; }
    .version { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; }
    .touch-status { font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 6px; }
    .touch-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

    /* Main */
    .main { flex: 1; display: flex; gap: 12px; overflow: hidden; }

    /* 左側遊戲區 */
    .game-section {
      flex: 1; background: rgba(0,0,0,0.25); border-radius: 10px;
      border: 2px solid rgba(168,85,247,0.4);
      display: flex; justify-content: center; align-items: center;
      position: relative; overflow: hidden;
    }
    #gameCanvas { background: rgba(0,0,0,0.3); }
    .overlay-msg {
      position: absolute; text-align: center; pointer-events: none;
    }
    .overlay-title {
      font-size: 42px; font-weight: 900; letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(248,113,113,0.6);
    }
    .overlay-sub {
      font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 10px; letter-spacing: 2px;
    }
    .title-gameover { color: #f87171; }
    .title-ready { color: #4ade80; }
    .title-pause { color: #fbbf24; }

    /* 右側控制區 */
    .controls-section {
      width: 280px; display: flex; flex-direction: column; gap: 10px;
    }

    /* 分數和狀態 */
    .stats-row { display: flex; gap: 10px; }
    .stat-box {
      flex: 1; background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      padding: 10px; text-align: center;
    }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .score-value { color: #4ade80; }
    .high-value { color: #a855f7; }
    .status-value { font-size: 14px; }
    .status-playing { color: #4ade80; }
    .status-gameover { color: #f87171; }
    .status-paused { color: #fbbf24; }

    /* 觸控區 */
    .touch-panel {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      padding: 12px; flex: 1;
    }
    .panel-title { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-bottom: 10px; }

    .touch-controls { display: flex; gap: 15px; height: calc(100% - 25px); }
    .dpad-section { flex: 1; display: flex; flex-direction: column; }
    .dpad-label { font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 8px; }
    .dpad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
      width: 100px; margin: 0 auto;
    }
    .dpad-btn {
      width: 32px; height: 32px; border: 1px solid rgba(168,85,247,0.4);
      border-radius: 6px; background: rgba(168,85,247,0.15);
      color: #e9d5ff; font-size: 16px; cursor: pointer;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.1s;
    }
    .dpad-btn:hover { background: rgba(168,85,247,0.3); }
    .dpad-btn:active { transform: scale(0.9); background: rgba(168,85,247,0.4); }
    .dpad-btn.empty { visibility: hidden; }

    .joystick-section { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .joystick-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .joystick-base {
      width: 90px; height: 90px; border-radius: 50%;
      border: 2px solid rgba(168,85,247,0.3);
      background: rgba(168,85,247,0.08);
      display: flex; justify-content: center; align-items: center;
      position: relative;
    }
    .joystick-knob {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      box-shadow: 0 0 15px rgba(168,85,247,0.5);
      cursor: pointer; transition: transform 0.1s;
    }
    .joystick-knob:active { transform: scale(1.1); }

    /* 遊戲控制 */
    .game-controls { display: flex; gap: 10px; }
    .ctrl-btn {
      flex: 1; padding: 12px; border: 1px solid rgba(168,85,247,0.4);
      border-radius: 8px; background: rgba(168,85,247,0.2);
      color: #e9d5ff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .ctrl-btn:hover { background: rgba(168,85,247,0.3); }
    .ctrl-btn:active { transform: scale(0.98); }

    /* Footer */
    .footer {
      margin-top: 10px; padding: 6px 14px;
      background: rgba(0,0,0,0.2); border-radius: 8px;
      font-size: 11px; color: rgba(255,255,255,0.5);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-left { display: flex; gap: 15px; }
    .footer-item { display: flex; align-items: center; gap: 6px; }
    .footer-dot { width: 5px; height: 5px; background: #4ade80; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn">◀ HOME</a>
        <div class="app-title">CYBER<span>SNAKE</span><span class="version">// v1.0</span></div>
      </div>
      <div class="touch-status"><div class="touch-dot"></div>TOUCH ENABLED</div>
    </div>

    <div class="main">
      <!-- 遊戲區 -->
      <div class="game-section">
        <canvas id="gameCanvas" width="420" height="420"></canvas>
        <div class="overlay-msg" id="overlayMsg">
          <div class="overlay-title title-ready" id="overlayTitle">READY</div>
          <div class="overlay-sub" id="overlaySub">按 SPACE 或點擊開始</div>
        </div>
      </div>

      <!-- 控制區 -->
      <div class="controls-section">
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">SCORE</div>
            <div class="stat-value score-value" id="score">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">HIGH</div>
            <div class="stat-value high-value" id="highScore">0</div>
          </div>
        </div>

        <div class="stat-box">
          <div class="stat-label">STATUS</div>
          <div class="stat-value status-value status-playing" id="status">READY</div>
        </div>

        <div class="touch-panel">
          <div class="panel-title">TOUCH CONTROLS</div>
          <div class="touch-controls">
            <div class="dpad-section">
              <div class="dpad-label">D-PAD</div>
              <div class="dpad">
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" onclick="setDir(0,-1)">▲</div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" onclick="setDir(-1,0)">◀</div>
                <div class="dpad-btn" id="centerBtn">●</div>
                <div class="dpad-btn" onclick="setDir(1,0)">▶</div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" onclick="setDir(0,1)">▼</div>
                <div class="dpad-btn empty"></div>
              </div>
            </div>
            <div class="joystick-section">
              <div class="joystick-label">JOYSTICK</div>
              <div class="joystick-base">
                <div class="joystick-knob" id="joystickKnob"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="game-controls">
          <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">PAUSE</button>
          <button class="ctrl-btn" onclick="startGame()">NEW GAME</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="footer-item"><div class="footer-dot"></div>CYBERSNAKE v1.0</div>
        <div class="footer-item">TOUCH ENABLED</div>
      </div>
      <div>USE D-PAD OR JOYSTICK</div>
      <div>Echo AI</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GRID = 20;
    const COLS = W / GRID, ROWS = H / GRID;

    // 遊戲狀態
    let snake = [];
    let food = null;
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let score = 0;
    let highScore = parseInt(localStorage.getItem('cybersnake_high')) || 0;
    let gameState = 'ready'; // ready | playing | paused | gameover
    let gameLoop = null;
    let speed = 120;

    document.getElementById('highScore').textContent = highScore;

    // 繪製
    function drawGrid() {
      ctx.strokeStyle = 'rgba(168,85,247,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += GRID) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y <= H; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const grad = ctx.createLinearGradient(seg.x * GRID, seg.y * GRID, (seg.x + 1) * GRID, (seg.y + 1) * GRID);
        if (isHead) {
          grad.addColorStop(0, '#4ade80');
          grad.addColorStop(1, '#22c55e');
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur = 12;
        } else {
          grad.addColorStop(0, '#a855f7');
          grad.addColorStop(1, '#7c3aed');
          ctx.shadowColor = '#a855f7';
          ctx.shadowBlur = 8;
        }
        ctx.fillStyle = grad;
        ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
        ctx.shadowBlur = 0;
      });
    }

    function drawFood() {
      if (!food) return;
      const pulse = Math.sin(Date.now() / 200) * 3;
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 15 + pulse;
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, W, H);
      drawGrid();
      drawFood();
      drawSnake();
    }

    // 遊戲邏輯
    function spawnFood() {
      do {
        food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function update() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 撞牆
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { gameOver(); return; }
      // 撞自己
      if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }

      snake.unshift(head);

      // 吃食物
      if (food && head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      gameState = 'gameover';
      clearInterval(gameLoop);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('cybersnake_high', highScore);
        document.getElementById('highScore').textContent = highScore;
      }
      document.getElementById('overlayTitle').textContent = 'GAME OVER';
      document.getElementById('overlayTitle').className = 'overlay-title title-gameover';
      document.getElementById('overlaySub').textContent = '按 SPACE 或點擊重新開始';
      document.getElementById('status').textContent = 'GAME OVER';
      document.getElementById('status').className = 'stat-value status-value status-gameover';
      document.getElementById('overlayMsg').style.display = 'block';
    }

    function startGame() {
      snake = [{ x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      document.getElementById('score').textContent = score;
      spawnFood();
      gameState = 'playing';
      document.getElementById('overlayMsg').style.display = 'none';
      document.getElementById('status').textContent = 'PLAYING';
      document.getElementById('status').className = 'stat-value status-value status-playing';
      document.getElementById('pauseBtn').textContent = 'PAUSE';
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(() => { update(); draw(); }, speed);
    }

    function togglePause() {
      if (gameState === 'playing') {
        gameState = 'paused';
        clearInterval(gameLoop);
        document.getElementById('overlayTitle').textContent = 'PAUSED';
        document.getElementById('overlayTitle').className = 'overlay-title title-pause';
        document.getElementById('overlaySub').textContent = '按 SPACE 繼續';
        document.getElementById('overlayMsg').style.display = 'block';
        document.getElementById('status').textContent = 'PAUSED';
        document.getElementById('status').className = 'stat-value status-value status-paused';
        document.getElementById('pauseBtn').textContent = 'RESUME';
      } else if (gameState === 'paused') {
        gameState = 'playing';
        document.getElementById('overlayMsg').style.display = 'none';
        document.getElementById('status').textContent = 'PLAYING';
        document.getElementById('status').className = 'stat-value status-value status-playing';
        document.getElementById('pauseBtn').textContent = 'PAUSE';
        gameLoop = setInterval(() => { update(); draw(); }, speed);
      }
    }

    function setDir(x, y) {
      if (gameState !== 'playing') return;
      if (dir.x + x === 0 && dir.y + y === 0) return; // 不能反轉
      nextDir = { x, y };
    }

    // 鍵盤
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'ready' || gameState === 'gameover') startGame();
        else if (gameState === 'paused') togglePause();
      } else if (e.code === 'ArrowUp' || e.key === 'w') setDir(0, -1);
      else if (e.code === 'ArrowDown' || e.key === 's') setDir(0, 1);
      else if (e.code === 'ArrowLeft' || e.key === 'a') setDir(-1, 0);
      else if (e.code === 'ArrowRight' || e.key === 'd') setDir(1, 0);
      else if (e.code === 'Escape' || e.key === 'p') togglePause();
    });

    // 點擊畫布開始
    canvas.addEventListener('click', () => {
      if (gameState === 'ready' || gameState === 'gameover') startGame();
    });

    // 搖桿拖拽
    const joystick = document.getElementById('joystickKnob');
    let dragging = false;
    joystick.addEventListener('mousedown', e => { dragging = true; });
    joystick.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); });
    document.addEventListener('mouseup', () => dragging = false);
    document.addEventListener('touchend', () => dragging = false);
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const rect = joystick.getBoundingClientRect();
      const base = rect.parent;
      const dx = e.clientX - rect.left - rect.width/2;
      const dy = e.clientY - rect.top - rect.height/2;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 10) setDir(1, 0); else if (dx < -10) setDir(-1, 0);
      } else {
        if (dy > 10) setDir(0, 1); else if (dy < -10) setDir(0, -1);
      }
    });

    // 初始化
    draw();
  </script>
</body>
</html>
