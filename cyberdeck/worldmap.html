    .home-btn {

    .coord-display {

      font-size: 10px; color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;

      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);

      padding: 14px; flex: 1; display: flex; flex-direction: column;

    .country-name { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .country-native { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 10px; }

    .info-value { font-weight: 600; color: #e9d5ff; text-align: right; max-width: 120px; }

    function latToY(lat) {
      // 簡單 Mercator 近似
      const latRad = lat * Math.PI / 180;
      const mercN = Math.log(Math.tan(Math.PI/4 + latRad/2));
      const yNorm = 0.5 - mercN / (2 * Math.PI);
      return yNorm * H * 1.8 - H * 0.15;
    }
    function xToLon(x) { return x / W * 360 - 180; }
    function yToLat(y) {
      const yNorm = (y + H * 0.15) / (H * 1.8);
      const mercN = (0.5 - yNorm) * 2 * Math.PI;

        poly:[[-81,-18],[-69,-18],[-69,0],[-81,0]] },
      { id:'CO', flag:'🇨🇴', name:'哥倫比亞', native:'Colombia', capital:'波哥大', pop:'5100 萬', area:'114 萬 km²', lang:'西班牙語', currency:'比索',
        desc:'南美洲西北部國家，咖啡產量世界第三。擁有加勒比海岸和安第斯山脈的多樣地理環境。',
        poly:[[-79,-4],[-67,-4],[-67,12],[-79,12]] },

      // 非洲
      { id:'EG', flag:'🇪🇬', name:'埃及', native:'Egypt', capital:'開羅', pop:'1.04 億', area:'100 萬 km²', lang:'阿拉伯語', currency:'埃及鎊',
        desc:'四大文明古國之一，金字塔和獅身人面像舉世聞名。尼羅河孕育了燦爛的古埃及文明，已有五千年歷史。',
        poly:[[25,22],[35,22],[35,32],[25,32]] },
      { id:'ZA', flag:'🇿🇦', name:'南非', native:'South Africa', capital:'比勒陀利亞', pop:'6000 萬', area:'122 萬 km²', lang:'英語等 11 種', currency:'蘭特 R',
        desc:'彩虹之國，非洲經濟最發達的國家之一。曼德拉的故鄉，擁有好望角和克魯格國家公園。',
        poly:[[16,-35],[33,-35],[33,-22],[16,-22]] },
      { id:'NG', flag:'🇳🇬', name:'奈及利亞', native:'Nigeria', capital:'阿布賈', pop:'2.2 億', area:'92.4 萬 km²', lang:'英語', currency:'奈拉 ₦',
        desc:'非洲人口最多的國家，也是非洲最大經濟體。尼萊塢電影產業產量全球第二，音樂文化影響深遠。',
        poly:[[3,4],[14,4],[14,14],[3,14]] },
      { id:'KE', flag:'🇰🇪', name:'肯亞', native:'Kenya', capital:'奈洛比', pop:'5400 萬', area:'58 萬 km²', lang:'英語/斯瓦希里語', currency:'先令',
        desc:'東非明珠，世界著名的野生動物天堂。馬賽馬拉國家保護區的動物大遷徙是自然界最壯觀的景象。',
        poly:[[34,-5],[42,-5],[42,5],[34,5]] },
      { id:'MA', flag:'🇲🇦', name:'摩洛哥', native:'Morocco', capital:'拉巴特', pop:'3700 萬', area:'44.7 萬 km²', lang:'阿拉伯語/法語', currency:'迪拉姆',
        desc:'北非的彩色國度，馬拉喀什的集市和撒哈拉沙漠令人著迷。藍色小鎮舍夫沙萬是網紅打卡地。',
        poly:[[-13,28],[-1,28],[-1,36],[-13,36]] },

      // 大洋洲
      { id:'AU', flag:'🇦🇺', name:'澳洲', native:'Australia', capital:'坎培拉', pop:'2600 萬', area:'769 萬 km²', lang:'英語', currency:'澳元 A$',
        desc:'世界上唯一佔據整個大陸的國家。雪梨歌劇院、大堡礁和袋鼠是其標誌。獨特的生態系統擁有眾多特有物種。',
        poly:[[113,-44],[154,-44],[154,-10],[113,-10]] },
      { id:'NZ', flag:'🇳🇿', name:'紐西蘭', native:'New Zealand', capital:'威靈頓', pop:'510 萬', area:'26.8 萬 km²', lang:'英語/毛利語', currency:'紐元 NZ$',
        desc:'南太平洋的世外桃源，《魔戒》的拍攝地。壯麗的峽灣、冰川和火山構成了令人驚嘆的自然風光。',
        poly:[[166,-47],[178,-47],[178,-34],[166,-34]] },
    ];

    // ─── 繪製 ───
    function drawMap() {
      // 背景
      ctx.fillStyle = '#0d1030';
      ctx.fillRect(0, 0, W, H);

      // 海洋漸變
      const oceanGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
      oceanGrad.addColorStop(0, '#151845');
      oceanGrad.addColorStop(1, '#0a0d28');
      ctx.fillStyle = oceanGrad;
      ctx.fillRect(0, 0, W, H);

      // 經緯線
      ctx.strokeStyle = 'rgba(168,85,247,0.08)';
      ctx.lineWidth = 0.5;
      for (let lon = -180; lon <= 180; lon += 30) {
        const x = lonToX(lon);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let lat = -60; lat <= 80; lat += 20) {
        const y = latToY(lat);
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // 繪製國家
      countries.forEach(c => {
        const pts = c.poly.map(p => [lonToX(p[0]), latToY(p[1])]);

        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();

        if (c === selectedCountry) {
          ctx.fillStyle = 'rgba(74,222,128,0.5)';
          ctx.strokeStyle = '#4ade80';
          ctx.lineWidth = 2;
        } else if (c === hoveredCountry) {
          ctx.fillStyle = 'rgba(168,85,247,0.45)';
          ctx.strokeStyle = '#a855f7';
          ctx.lineWidth = 1.5;
        } else {
          ctx.fillStyle = 'rgba(168,85,247,0.25)';
          ctx.strokeStyle = 'rgba(168,85,247,0.4)';
          ctx.lineWidth = 0.8;
        }
        ctx.fill();
        ctx.stroke();
      });
    }

    // 點擊檢測
    function hitTest(mx, my) {
      for (let ci = countries.length - 1; ci >= 0; ci--) {
        const c = countries[ci];
        const pts = c.poly.map(p => [lonToX(p[0]), latToY(p[1])]);
        if (pointInPoly(mx, my, pts)) return c;
      }
      return null;
    }

    function pointInPoly(x, y, pts) {
      let inside = false;
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        const xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];
        if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) inside = !inside;
      }
      return inside;
    }

    function showCountry(c) {
      selectedCountry = c;
      document.getElementById('emptyState').style.display = 'none';
      const info = document.getElementById('countryInfo');
      info.style.display = 'block';
      info.innerHTML = `
        <div class="country-flag">${c.flag}</div>
        <div class="country-name">${c.name}</div>
        <div class="country-native">${c.native}</div>
        <div class="info-grid">
          <div class="info-row"><span class="info-label">首都</span><span class="info-value">${c.capital}</span></div>
          <div class="info-row"><span class="info-label">人口</span><span class="info-value">${c.pop}</span></div>
          <div class="info-row"><span class="info-label">面積</span><span class="info-value">${c.area}</span></div>
          <div class="info-row"><span class="info-label">語言</span><span class="info-value">${c.lang}</span></div>
          <div class="info-row"><span class="info-label">貨幣</span><span class="info-value">${c.currency}</span></div>
        </div>
        <div class="country-desc">${c.desc}</div>
      `;
      drawMap();
    }

    // 搜索
    function searchCountry(q) {
      if (!q) return;
      q = q.toLowerCase();
      const found = countries.find(c =>
        c.name.includes(q) || c.native.toLowerCase().includes(q) || c.id.toLowerCase() === q
      );
      if (found) showCountry(found);
    }

    // 事件
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / rect.width * W;
      const my = (e.clientY - rect.top) / rect.height * H;
      const c = hitTest(mx, my);
      if (c) showCountry(c);
    });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / rect.width * W;
      const my = (e.clientY - rect.top) / rect.height * H;
      const lon = xToLon(mx).toFixed(1);
      const lat = yToLat(my).toFixed(1);
      document.getElementById('coordDisplay').textContent = `${lat}°${lat>0?'N':'S'} ${lon}°${lon>0?'E':'W'}`;

      const prev = hoveredCountry;
      hoveredCountry = hitTest(mx, my);
      if (hoveredCountry !== prev) drawMap();
      canvas.style.cursor = hoveredCountry ? 'pointer' : 'crosshair';
    });

    // 時鐘
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock(); setInterval(updateClock, 1000);

    // 初始化
    drawMap();
  </script>
</body>
