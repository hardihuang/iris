<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>多功能計時器 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
    }

    /* 顶部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 15px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 模式切换 */
    .mode-tabs {
      display: flex;
      gap: 6px;
    }

    .mode-tab {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 6px 14px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .mode-tab:hover { background: rgba(255,255,255,0.15); }

    .mode-tab.active {
      background: rgba(255,255,255,0.25);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
      font-weight: 600;
    }

    /* 主内容 */
    .main {
      flex: 1;
      display: flex;
      gap: 14px;
      overflow: hidden;
    }

    /* 左侧 - 计时器主区 */
    .timer-panel {
      flex: 1;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 圆环进度 */
    .timer-ring-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 18px;
    }

    .timer-ring {
      transform: rotate(-90deg);
      width: 220px;
      height: 220px;
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 8;
    }

    .ring-progress {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease;
    }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .timer-time {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .timer-ms {
      font-size: 20px;
      opacity: 0.6;
      font-weight: 400;
    }

    .timer-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* 控制按钮 */
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 5px;
    }

    .ctrl-btn {
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn.primary {
      background: rgba(74,222,128,0.3);
      color: #4ade80;
      border: 2px solid rgba(74,222,128,0.4);
    }

    .ctrl-btn.primary.running {
      background: rgba(251,191,36,0.3);
      color: #fbbf24;
      border-color: rgba(251,191,36,0.4);
    }

    .ctrl-btn.danger {
      background: rgba(248,113,113,0.2);
      color: #f87171;
      border: 2px solid rgba(248,113,113,0.3);
    }

    .ctrl-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      border: 2px solid rgba(255,255,255,0.2);
    }

    .ctrl-btn:hover { transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.95); }

    /* 右侧面板 */
    .side-panel {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 14px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 倒计时预设 */
    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .preset-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.25);
    }

    .preset-btn.active {
      background: rgba(168,85,247,0.35);
      border-color: rgba(168,85,247,0.5);
    }

    .preset-time {
      font-size: 18px;
      font-weight: 700;
      display: block;
    }

    .preset-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    /* 自定义输入 */
    .custom-input-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .time-input {
      width: 100%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 6px 8px;
      color: #fff;
      font-size: 14px;
      text-align: center;
      outline: none;
    }

    .time-input::placeholder { color: rgba(255,255,255,0.4); }
    .time-input:focus { border-color: rgba(255,255,255,0.4); }

    .time-input-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: 2px;
    }

    .time-input-group { flex: 1; }

    /* 番茄钟设置 */
    .pomo-settings {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pomo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .pomo-row span { color: rgba(255,255,255,0.8); }

    .pomo-value {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pomo-adj {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 4px;
      width: 24px;
      height: 24px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pomo-adj:hover { background: rgba(255,255,255,0.25); }

    .pomo-num {
      font-weight: 600;
      min-width: 30px;
      text-align: center;
      font-size: 15px;
    }

    .pomo-progress {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      justify-content: center;
    }

    .pomo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      transition: all 0.3s;
    }

    .pomo-dot.done {
      background: #4ade80;
      border-color: #4ade80;
    }

    .pomo-dot.current {
      background: rgba(251,191,36,0.4);
      border-color: #fbbf24;
      animation: pomoPulse 1.5s infinite;
    }

    @keyframes pomoPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(251,191,36,0); }
    }

    /* 圈速记录（秒表） */
    .laps {
      flex: 1;
      overflow-y: auto;
      max-height: 180px;
    }

    .laps::-webkit-scrollbar { width: 4px; }
    .laps::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
    }

    .lap-num { color: rgba(255,255,255,0.5); }
    .lap-time { font-variant-numeric: tabular-nums; }
    .lap-diff { color: rgba(255,255,255,0.5); font-size: 12px; }

    .lap-best .lap-time { color: #4ade80; }
    .lap-worst .lap-time { color: #f87171; }

    /* 底部 */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 15px;
      margin-top: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" style="color:#fff;text-decoration:none;font-size:20px;margin-right:6px;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.15);transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'" title="返回桌面">🏠</a>
        ⏱ 多功能計時器
      </h1>
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="countdown" onclick="switchMode('countdown')">⏳ 倒計時</div>
        <div class="mode-tab" data-mode="stopwatch" onclick="switchMode('stopwatch')">🏃 秒錶</div>
        <div class="mode-tab" data-mode="pomodoro" onclick="switchMode('pomodoro')">🍅 番茄鐘</div>
      </div>
    </div>

    <div class="main">
      <!-- 计时器主区 -->
      <div class="timer-panel">
        <div class="timer-ring-wrapper">
          <svg class="timer-ring" viewBox="0 0 220 220">
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="110" cy="110" r="100" />
            <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"
              stroke-dasharray="628.318" stroke-dashoffset="0" />
          </svg>
          <div class="timer-display">
            <div class="timer-time" id="timerTime">00:00</div>
            <div class="timer-label" id="timerLabel">準備開始</div>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn secondary" id="btnReset" onclick="resetTimer()" title="重置">↺</button>
          <button class="ctrl-btn primary" id="btnStart" onclick="toggleTimer()" title="開始">▶</button>
          <button class="ctrl-btn secondary" id="btnLap" onclick="lapTimer()" title="圈速" style="display:none;">⏎</button>
        </div>
      </div>

      <!-- 右侧面板 -->
      <div class="side-panel">
        <!-- 倒计时面板 -->
        <div class="card" id="panelCountdown">
          <div class="card-title">⏳ 快速設定</div>
          <div class="presets">
            <div class="preset-btn" onclick="setPreset(1)"><span class="preset-time">1:00</span><span class="preset-label">1 分鐘</span></div>
            <div class="preset-btn" onclick="setPreset(3)"><span class="preset-time">3:00</span><span class="preset-label">3 分鐘</span></div>
            <div class="preset-btn" onclick="setPreset(5)"><span class="preset-time">5:00</span><span class="preset-label">5 分鐘</span></div>
            <div class="preset-btn" onclick="setPreset(10)"><span class="preset-time">10:00</span><span class="preset-label">10 分鐘</span></div>
            <div class="preset-btn" onclick="setPreset(15)"><span class="preset-time">15:00</span><span class="preset-label">15 分鐘</span></div>
            <div class="preset-btn" onclick="setPreset(30)"><span class="preset-time">30:00</span><span class="preset-label">30 分鐘</span></div>
          </div>
          <div class="custom-input-row">
            <div class="time-input-group">
              <input type="number" class="time-input" id="inputMin" placeholder="00" min="0" max="99">
              <div class="time-input-label">分</div>
            </div>
            <div class="time-input-group">
              <input type="number" class="time-input" id="inputSec" placeholder="00" min="0" max="59">
              <div class="time-input-label">秒</div>
            </div>
          </div>
        </div>

        <!-- 秒表面板 -->
        <div class="card hidden" id="panelStopwatch" style="flex:1;">
          <div class="card-title">🏁 圈速記錄</div>
          <div class="laps" id="lapList">
            <div style="text-align:center;color:rgba(255,255,255,0.4);font-size:13px;padding:20px 0;">
              按下 ⏎ 記錄圈速
            </div>
          </div>
        </div>

        <!-- 番茄钟面板 -->
        <div class="card hidden" id="panelPomodoro">
          <div class="card-title">🍅 番茄鐘設定</div>
          <div class="pomo-settings">
            <div class="pomo-row">
              <span>🔴 專注</span>
              <div class="pomo-value">
                <button class="pomo-adj" onclick="adjustPomo('work',-5)">−</button>
                <span class="pomo-num" id="pomoWork">25</span>
                <button class="pomo-adj" onclick="adjustPomo('work',5)">+</button>
                <span style="font-size:12px;opacity:0.5;">分</span>
              </div>
            </div>
            <div class="pomo-row">
              <span>🟢 短休</span>
              <div class="pomo-value">
                <button class="pomo-adj" onclick="adjustPomo('short',-1)">−</button>
                <span class="pomo-num" id="pomoShort">5</span>
                <button class="pomo-adj" onclick="adjustPomo('short',1)">+</button>
                <span style="font-size:12px;opacity:0.5;">分</span>
              </div>
            </div>
            <div class="pomo-row">
              <span>🔵 長休</span>
              <div class="pomo-value">
                <button class="pomo-adj" onclick="adjustPomo('long',-5)">−</button>
                <span class="pomo-num" id="pomoLong">15</span>
                <button class="pomo-adj" onclick="adjustPomo('long',5)">+</button>
                <span style="font-size:12px;opacity:0.5;">分</span>
              </div>
            </div>
          </div>
          <div style="margin-top:12px;">
            <div class="card-title" style="margin-bottom:6px;">📊 今日進度</div>
            <div class="pomo-progress" id="pomoProgress"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="status-dot"></div>
        <span>Echo AI 驅動</span>
      </div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    // ─── 状态 ───
    let mode = 'countdown';        // countdown | stopwatch | pomodoro
    let running = false;
    let intervalId = null;

    // 倒计时
    let cdTotal = 0;               // 总秒数
    let cdRemain = 0;              // 剩余秒数

    // 秒表
    let swStart = 0;
    let swElapsed = 0;
    let swLaps = [];

    // 番茄钟
    let pomoWork = 25, pomoShort = 5, pomoLong = 15;
    let pomoCycle = 0;             // 已完成番茄数
    let pomoPhase = 'work';        // work | short | long
    let pomoRemain = 0;

    const CIRC = 2 * Math.PI * 100; // 628.318

    // ─── 模式切换 ───
    function switchMode(m) {
      if (running) toggleTimer();
      mode = m;
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
      document.getElementById('panelCountdown').classList.toggle('hidden', m !== 'countdown');
      document.getElementById('panelStopwatch').classList.toggle('hidden', m !== 'stopwatch');
      document.getElementById('panelPomodoro').classList.toggle('hidden', m !== 'pomodoro');
      document.getElementById('btnLap').style.display = m === 'stopwatch' ? '' : 'none';

      resetTimer();
    }

    // ─── 开始 / 暂停 ───
    function toggleTimer() {
      if (running) {
        pause();
      } else {
        start();
      }
    }

    function start() {
      if (mode === 'countdown') {
        if (cdRemain <= 0) {
          const m = parseInt(document.getElementById('inputMin').value) || 0;
          const s = parseInt(document.getElementById('inputSec').value) || 0;
          cdTotal = m * 60 + s;
          cdRemain = cdTotal;
        }
        if (cdRemain <= 0) return;
      }
      if (mode === 'stopwatch') {
        swStart = performance.now() - swElapsed;
      }
      if (mode === 'pomodoro') {
        if (pomoRemain <= 0) {
          pomoPhase = 'work';
          pomoRemain = pomoWork * 60;
        }
      }

      running = true;
      updateBtn();
      intervalId = setInterval(tick, mode === 'stopwatch' ? 33 : 200);
    }

    function pause() {
      running = false;
      clearInterval(intervalId);
      if (mode === 'stopwatch') swElapsed = performance.now() - swStart;
      updateBtn();
    }

    function resetTimer() {
      pause();
      if (mode === 'countdown') {
        cdRemain = 0;
        cdTotal = 0;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      }
      if (mode === 'stopwatch') {
        swElapsed = 0;
        swLaps = [];
        document.getElementById('lapList').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);font-size:13px;padding:20px 0;">按下 ⏎ 記錄圈速</div>';
      }
      if (mode === 'pomodoro') {
        pomoPhase = 'work';
        pomoRemain = 0;
        pomoCycle = 0;
        renderPomoProgress();
      }
      updateDisplay();
      setRing(0);
      document.getElementById('timerLabel').textContent = '準備開始';
    }

    // ─── Tick ───
    function tick() {
      if (mode === 'countdown') {
        cdRemain = Math.max(0, cdRemain - 0.2);
        if (cdRemain <= 0) {
          cdRemain = 0;
          pause();
          document.getElementById('timerLabel').textContent = '⏰ 時間到！';
          flash();
        }
        setRing(cdTotal > 0 ? 1 - cdRemain / cdTotal : 0);
      }

      if (mode === 'stopwatch') {
        swElapsed = performance.now() - swStart;
      }

      if (mode === 'pomodoro') {
        pomoRemain = Math.max(0, pomoRemain - 0.2);
        const total = pomoPhase === 'work' ? pomoWork * 60 : pomoPhase === 'short' ? pomoShort * 60 : pomoLong * 60;
        setRing(total > 0 ? 1 - pomoRemain / total : 0);
        if (pomoRemain <= 0) {
          pomoRemain = 0;
          pause();
          nextPomoPhase();
        }
      }

      updateDisplay();
    }

    // ─── 番茄钟阶段切换 ───
    function nextPomoPhase() {
      if (pomoPhase === 'work') {
        pomoCycle++;
        renderPomoProgress();
        if (pomoCycle % 4 === 0) {
          pomoPhase = 'long';
          pomoRemain = pomoLong * 60;
          document.getElementById('timerLabel').textContent = '🔵 長休息';
        } else {
          pomoPhase = 'short';
          pomoRemain = pomoShort * 60;
          document.getElementById('timerLabel').textContent = '🟢 短休息';
        }
      } else {
        pomoPhase = 'work';
        pomoRemain = pomoWork * 60;
        document.getElementById('timerLabel').textContent = '🔴 專注中';
      }
      flash();
      updateDisplay();
    }

    function renderPomoProgress() {
      const el = document.getElementById('pomoProgress');
      let html = '';
      for (let i = 0; i < 4; i++) {
        const cls = i < pomoCycle % 4 ? 'done' : (i === pomoCycle % 4 && pomoPhase === 'work' && running ? 'current' : '');
        html += `<div class="pomo-dot ${cls}"></div>`;
      }
      const full = Math.floor(pomoCycle / 4);
      if (full > 0) html += `<span style="font-size:12px;color:rgba(255,255,255,0.5);margin-left:4px;">×${full}</span>`;
      el.innerHTML = html;
    }

    function adjustPomo(type, delta) {
      if (type === 'work') pomoWork = Math.max(5, Math.min(60, pomoWork + delta));
      if (type === 'short') pomoShort = Math.max(1, Math.min(15, pomoShort + delta));
      if (type === 'long') pomoLong = Math.max(5, Math.min(30, pomoLong + delta));
      document.getElementById('pomoWork').textContent = pomoWork;
      document.getElementById('pomoShort').textContent = pomoShort;
      document.getElementById('pomoLong').textContent = pomoLong;
    }

    // ─── 圈速 ───
    function lapTimer() {
      if (!running || mode !== 'stopwatch') return;
      const t = performance.now() - swStart;
      const prev = swLaps.length ? swLaps[swLaps.length - 1].total : 0;
      swLaps.push({ total: t, diff: t - prev });
      renderLaps();
    }

    function renderLaps() {
      const el = document.getElementById('lapList');
      if (!swLaps.length) return;
      const diffs = swLaps.map(l => l.diff);
      const best = Math.min(...diffs);
      const worst = Math.max(...diffs);

      el.innerHTML = swLaps.slice().reverse().map((l, i) => {
        const num = swLaps.length - i;
        let cls = '';
        if (swLaps.length > 2) {
          if (l.diff === best) cls = 'lap-best';
          else if (l.diff === worst) cls = 'lap-worst';
        }
        return `<div class="lap-item ${cls}">
          <span class="lap-num">#${num}</span>
          <span class="lap-time">${fmtMs(l.diff)}</span>
          <span class="lap-diff">${fmtMs(l.total)}</span>
        </div>`;
      }).join('');
    }

    // ─── 预设 ───
    function setPreset(min) {
      if (running) pause();
      cdTotal = min * 60;
      cdRemain = cdTotal;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById('inputMin').value = min;
      document.getElementById('inputSec').value = 0;
      setRing(0);
      updateDisplay();
      document.getElementById('timerLabel').textContent = `${min} 分鐘倒計時`;
    }

    // ─── 显示更新 ───
    function updateDisplay() {
      const el = document.getElementById('timerTime');
      if (mode === 'countdown') {
        el.textContent = fmtSec(Math.ceil(cdRemain));
      }
      if (mode === 'stopwatch') {
        el.innerHTML = fmtMsFull(swElapsed);
      }
      if (mode === 'pomodoro') {
        el.textContent = fmtSec(Math.ceil(pomoRemain));
        if (running) {
          const labels = { work: '🔴 專注中', short: '🟢 短休息', long: '🔵 長休息' };
          document.getElementById('timerLabel').textContent = labels[pomoPhase] || '';
          renderPomoProgress();
        }
      }
    }

    function updateBtn() {
      const btn = document.getElementById('btnStart');
      btn.innerHTML = running ? '⏸' : '▶';
      btn.classList.toggle('running', running);
      btn.title = running ? '暫停' : '開始';
    }

    function setRing(pct) {
      const offset = CIRC * (1 - Math.min(1, Math.max(0, pct)));
      document.getElementById('ringProgress').style.strokeDashoffset = offset;
    }

    function flash() {
      document.querySelector('.timer-panel').style.animation = 'none';
      // 简单闪烁
    }

    // ─── 格式化 ───
    function fmtSec(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function fmtMs(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      const cs = Math.floor((ms % 1000) / 10);
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    }

    function fmtMsFull(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      const cs = Math.floor((ms % 1000) / 10);
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}<span class="timer-ms">.${String(cs).padStart(2,'0')}</span>`;
    }

    // ─── 时钟 ───
    function updateClock() {
      const now = new Date();
      const t = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      const d = now.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });
      document.getElementById('clock').textContent = `${d} ${t}`;
    }

    // ─── 自定义输入同步 ───
    document.getElementById('inputMin').addEventListener('change', () => {
      const m = parseInt(document.getElementById('inputMin').value) || 0;
      const s = parseInt(document.getElementById('inputSec').value) || 0;
      cdTotal = m * 60 + s;
      cdRemain = cdTotal;
      setRing(0);
      updateDisplay();
      document.getElementById('timerLabel').textContent = cdTotal > 0 ? `${m}分${s}秒 倒計時` : '準備開始';
    });
    document.getElementById('inputSec').addEventListener('change', () => {
      document.getElementById('inputMin').dispatchEvent(new Event('change'));
    });

    // ─── 初始化 ───
    updateDisplay();
    updateClock();
    setInterval(updateClock, 1000);
    renderPomoProgress();
  </script>
</body>
</html>
