<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🎵 CyberBeat - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff; user-select: none;
    }
    .container { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* 顶部 HUD */
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 20px; background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .hud-left { display: flex; align-items: center; gap: 10px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .game-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    .game-title span { color: #4ade80; }

    .hud-center { display: flex; gap: 20px; }
    .hud-stat { text-align: center; }
    .hud-stat-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .hud-stat-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
    .score-value { color: #4ade80; }
    .combo-value { color: #fbbf24; }
    .combo-value.fire { color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.5); }

    .hud-right { display: flex; align-items: center; gap: 10px; }
    .accuracy { font-size: 14px; font-weight: 600; }

    /* 游戏区 */
    .game-area {
      flex: 1; position: relative; overflow: hidden;
      background: rgba(0,0,0,0.15);
    }

    /* 轨道 */
    .lanes {
      position: absolute; top: 0; bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 400px; display: flex; gap: 4px;
    }
    .lane {
      flex: 1; position: relative;
      background: rgba(255,255,255,0.03);
      border-left: 1px solid rgba(255,255,255,0.06);
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    /* 判定线 */
    .hit-zone {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 400px; height: 4px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    }
    .hit-zone::before {
      content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 20px;
      background: linear-gradient(180deg, transparent, rgba(168,85,247,0.15), transparent);
    }

    /* 按键提示 */
    .key-hints {
      position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
      width: 400px; display: flex; gap: 4px;
    }
    .key-hint {
      flex: 1; text-align: center; padding: 8px 0;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; font-size: 16px; font-weight: 700;
      transition: all 0.1s;
    }
    .key-hint.active {
      background: rgba(168,85,247,0.5); border-color: rgba(168,85,247,0.7);
      box-shadow: 0 0 15px rgba(168,85,247,0.4);
      transform: scale(1.05);
    }
    .key-label { font-size: 10px; color: rgba(255,255,255,0.4); display: block; margin-top: 2px; }

    /* 音符 */
    .note {
      position: absolute; width: calc(100% - 8px); left: 4px;
      height: 18px; border-radius: 4px;
      transition: none;
    }
    .note-0 { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 0 8px rgba(248,113,113,0.4); }
    .note-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); box-shadow: 0 0 8px rgba(251,191,36,0.4); }
    .note-2 { background: linear-gradient(135deg, #4ade80, #22c55e); box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    .note-3 { background: linear-gradient(135deg, #60a5fa, #3b82f6); box-shadow: 0 0 8px rgba(96,165,250,0.4); }

    /* 判定特效 */
    .hit-effect {
      position: absolute; bottom: 55px; left: 50%; transform: translateX(-50%);
      font-size: 18px; font-weight: 800; pointer-events: none;
      animation: hitFloat 0.6s ease-out forwards; z-index: 10;
    }
    @keyframes hitFloat {
      0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1.3); }
    }
    .hit-perfect { color: #4ade80; text-shadow: 0 0 10px rgba(74,222,128,0.6); }
    .hit-great { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.6); }
    .hit-good { color: #60a5fa; }
    .hit-miss { color: #f87171; }

    /* 开始画面 */
    .start-screen {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 50;
    }
    .start-title {
      font-size: 48px; font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(135deg, #4ade80, #a855f7, #f87171);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .start-subtitle { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 30px; letter-spacing: 3px; }

    .difficulty-select { display: flex; gap: 12px; margin-bottom: 25px; }
    .diff-btn {
      padding: 10px 24px; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .diff-btn:hover { background: rgba(255,255,255,0.15); }
    .diff-btn.active { background: rgba(168,85,247,0.4); border-color: rgba(168,85,247,0.6); color: #fff; }

    .start-btn {
      padding: 14px 50px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
      letter-spacing: 2px; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(74,222,128,0.4);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74,222,128,0.5); }

    .controls-hint {
      margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.4);
    }

    /* 结算 */
    .result-screen {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 50;
    }
    .result-title { font-size: 36px; font-weight: 900; margin-bottom: 5px; }
    .result-rank { font-size: 64px; margin-bottom: 15px; }
    .result-stats { display: flex; gap: 30px; margin-bottom: 25px; }
    .result-stat { text-align: center; }
    .result-stat-value { font-size: 28px; font-weight: 700; }
    .result-stat-label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .result-btn {
      padding: 12px 40px; border: none; border-radius: 10px;
      background: rgba(168,85,247,0.4); border: 1px solid rgba(168,85,247,0.5);
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .result-btn:hover { background: rgba(168,85,247,0.6); }

    /* 侧边装饰 */
    .side-decor {
      position: absolute; top: 0; bottom: 0; width: 160px;
      display: flex; flex-direction: column; justify-content: center; gap: 8px;
      padding: 20px;
    }
    .side-left { left: 0; }
    .side-right { right: 0; align-items: flex-end; }
    .bar {
      height: 3px; border-radius: 2px; opacity: 0.3;
      animation: barPulse 2s infinite;
    }
    .bar-purple { background: #a855f7; }
    .bar-green { background: #4ade80; }
    @keyframes barPulse {
      0%,100% { opacity: 0.15; width: 60%; }
      50% { opacity: 0.4; width: 100%; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="hud">
      <div class="hud-left">
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        <div class="game-title">CYBER<span>BEAT</span></div>
      </div>
      <div class="hud-center">
        <div class="hud-stat">
          <div class="hud-stat-value score-value" id="score">0</div>
          <div class="hud-stat-label">Score</div>
        </div>
        <div class="hud-stat">
          <div class="hud-stat-value combo-value" id="combo">0</div>
          <div class="hud-stat-label">Combo</div>
        </div>
        <div class="hud-stat">
          <div class="hud-stat-value" id="maxCombo">0</div>
          <div class="hud-stat-label">Max</div>
        </div>
      </div>
      <div class="hud-right">
        <div class="accuracy" id="accuracy">100.0%</div>
      </div>
    </div>

    <div class="game-area" id="gameArea">
      <!-- 装饰 -->
      <div class="side-decor side-left">
        <div class="bar bar-purple" style="width:80%;animation-delay:0s"></div>
        <div class="bar bar-green" style="width:60%;animation-delay:0.3s"></div>
        <div class="bar bar-purple" style="width:90%;animation-delay:0.6s"></div>
        <div class="bar bar-green" style="width:50%;animation-delay:0.9s"></div>
        <div class="bar bar-purple" style="width:70%;animation-delay:1.2s"></div>
      </div>
      <div class="side-decor side-right">
        <div class="bar bar-green" style="width:70%;animation-delay:0.2s"></div>
        <div class="bar bar-purple" style="width:90%;animation-delay:0.5s"></div>
        <div class="bar bar-green" style="width:60%;animation-delay:0.8s"></div>
        <div class="bar bar-purple" style="width:80%;animation-delay:1.1s"></div>
        <div class="bar bar-green" style="width:50%;animation-delay:1.4s"></div>
      </div>

      <div class="lanes" id="lanes">
        <div class="lane" id="lane0"></div>
        <div class="lane" id="lane1"></div>
        <div class="lane" id="lane2"></div>
        <div class="lane" id="lane3"></div>
      </div>
      <div class="hit-zone"></div>
      <div class="key-hints">
        <div class="key-hint" id="key0">D<span class="key-label">←</span></div>
        <div class="key-hint" id="key1">F<span class="key-label">↙</span></div>
        <div class="key-hint" id="key2">J<span class="key-label">↘</span></div>
        <div class="key-hint" id="key3">K<span class="key-label">→</span></div>
      </div>

      <!-- 开始画面 -->
      <div class="start-screen" id="startScreen">
        <div class="start-title">CYBERBEAT</div>
        <div class="start-subtitle">節 奏 挑 戰</div>
        <div class="difficulty-select">
          <div class="diff-btn active" data-diff="easy" onclick="setDiff(this)">🌿 簡單</div>
          <div class="diff-btn" data-diff="normal" onclick="setDiff(this)">⚡ 普通</div>
          <div class="diff-btn" data-diff="hard" onclick="setDiff(this)">🔥 困難</div>
        </div>
        <button class="start-btn" onclick="startGame()">▶ 開始遊戲</button>
        <div class="controls-hint">按鍵：D F J K ｜ 在音符到達底部時按下對應按鍵</div>
      </div>

      <!-- 结算 -->
      <div class="result-screen hidden" id="resultScreen">
        <div class="result-title">遊戲結束</div>
        <div class="result-rank" id="resultRank">S</div>
        <div class="result-stats">
          <div class="result-stat">
            <div class="result-stat-value score-value" id="finalScore">0</div>
            <div class="result-stat-label">總分</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-value combo-value" id="finalMaxCombo">0</div>
            <div class="result-stat-label">最大連擊</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-value" id="finalAccuracy">0%</div>
            <div class="result-stat-label">準確率</div>
          </div>
        </div>
        <div class="result-stats" style="gap:20px;margin-bottom:20px;">
          <div class="result-stat"><div class="result-stat-value" style="color:#4ade80" id="rPerfect">0</div><div class="result-stat-label">Perfect</div></div>
          <div class="result-stat"><div class="result-stat-value" style="color:#fbbf24" id="rGreat">0</div><div class="result-stat-label">Great</div></div>
          <div class="result-stat"><div class="result-stat-value" style="color:#60a5fa" id="rGood">0</div><div class="result-stat-label">Good</div></div>
          <div class="result-stat"><div class="result-stat-value" style="color:#f87171" id="rMiss">0</div><div class="result-stat-label">Miss</div></div>
        </div>
        <button class="result-btn" onclick="backToStart()">再來一局</button>
      </div>
    </div>
  </div>

  <script>
    // ─── 配置 ───
    const LANE_KEYS = ['d','f','j','k'];
    const DIFFICULTIES = {
      easy:   { speed: 2.5, interval: 800, totalNotes: 50,  name: '簡單' },
      normal: { speed: 3.5, interval: 550, totalNotes: 80,  name: '普通' },
      hard:   { speed: 5,   interval: 380, totalNotes: 120, name: '困難' }
    };

    let difficulty = 'easy';
    let gameRunning = false;
    let score = 0, combo = 0, maxCombo = 0;
    let perfects = 0, greats = 0, goods = 0, misses = 0;
    let totalHits = 0;
    let notes = [];
    let noteId = 0;
    let spawnTimer = null;
    let notesSpawned = 0;
    let animFrame = null;

    const gameArea = document.getElementById('gameArea');
    const lanes = [0,1,2,3].map(i => document.getElementById('lane' + i));
    const keyHints = [0,1,2,3].map(i => document.getElementById('key' + i));

    // ─── Audio ───
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playHitSound(freq, dur) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }

    function playBeat(lane) {
      const freqs = [523.25, 659.25, 783.99, 987.77]; // C5 E5 G5 B5
      playHitSound(freqs[lane], 0.12);
    }

    function playMissSound() { playHitSound(200, 0.08); }

    // ─── 难度 ───
    function setDiff(el) {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      difficulty = el.dataset.diff;
    }

    // ─── 生成节拍谱面 ───
    function generateBeatmap() {
      const cfg = DIFFICULTIES[difficulty];
      const map = [];
      let time = 2000; // 2秒后开始
      for (let i = 0; i < cfg.totalNotes; i++) {
        // 随机轨道，偶尔双押
        const lane = Math.floor(Math.random() * 4);
        map.push({ time, lane });

        // 10% 概率双押
        if (Math.random() < 0.1 && difficulty !== 'easy') {
          let lane2 = (lane + 1 + Math.floor(Math.random() * 3)) % 4;
          map.push({ time, lane: lane2 });
        }

        // 间隔有节奏感的变化
        const base = cfg.interval;
        const variation = Math.random() < 0.3 ? base * 0.5 : (Math.random() < 0.2 ? base * 1.5 : base);
        time += variation;
      }
      return map;
    }

    // ─── 游戏 ───
    let beatmap = [];
    let beatmapIdx = 0;
    let gameStartTime = 0;

    function startGame() {
      initAudio();
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.add('hidden');

      // 重置
      score = 0; combo = 0; maxCombo = 0;
      perfects = 0; greats = 0; goods = 0; misses = 0; totalHits = 0;
      notes.forEach(n => n.el && n.el.remove());
      notes = [];
      noteId = 0; beatmapIdx = 0; notesSpawned = 0;
      updateHUD();

      beatmap = generateBeatmap();
      gameStartTime = performance.now();
      gameRunning = true;
      gameLoop();
    }

    function gameLoop() {
      if (!gameRunning) return;
      const now = performance.now();
      const elapsed = now - gameStartTime;
      const cfg = DIFFICULTIES[difficulty];
      const gameAreaH = gameArea.offsetHeight - 60; // 减去按键区域
      const hitY = gameAreaH; // 判定线位置

      // 生成音符
      while (beatmapIdx < beatmap.length && beatmap[beatmapIdx].time <= elapsed + (gameAreaH / cfg.speed * 16.67)) {
        const beat = beatmap[beatmapIdx];
        spawnNote(beat.lane, beat.time);
        beatmapIdx++;
      }

      // 更新音符位置
      for (let i = notes.length - 1; i >= 0; i--) {
        const note = notes[i];
        const noteElapsed = elapsed - note.spawnTime;
        const travelTime = gameAreaH / cfg.speed * 16.67;
        const progress = noteElapsed / travelTime;
        const y = progress * gameAreaH;

        if (note.el) {
          note.el.style.top = y + 'px';
        }

        // 超出判定区 = miss
        if (y > hitY + 50 && !note.hit) {
          note.hit = true;
          missNote(note);
        }

        // 移除已消失的音符
        if (y > hitY + 100) {
          if (note.el) note.el.remove();
          notes.splice(i, 1);
        }
      }

      // 检查游戏结束
      if (beatmapIdx >= beatmap.length && notes.length === 0) {
        endGame();
        return;
      }

      animFrame = requestAnimationFrame(gameLoop);
    }

    function spawnNote(lane, beatTime) {
      const cfg = DIFFICULTIES[difficulty];
      const gameAreaH = gameArea.offsetHeight - 60;
      const travelTime = gameAreaH / cfg.speed * 16.67;

      const el = document.createElement('div');
      el.className = `note note-${lane}`;
      el.style.top = '-20px';
      lanes[lane].appendChild(el);

      notes.push({
        id: noteId++,
        lane,
        el,
        spawnTime: beatTime - travelTime,
        beatTime,
        hit: false
      });
    }

    function hitNote(lane) {
      if (!gameRunning) return;
      const now = performance.now();
      const elapsed = now - gameStartTime;
      const cfg = DIFFICULTIES[difficulty];

      keyHints[lane].classList.add('active');
      setTimeout(() => keyHints[lane].classList.remove('active'), 100);

      // 找最近的未击中音符
      let closest = null, closestDist = Infinity;
      for (const note of notes) {
        if (note.lane !== lane || note.hit) continue;
        const dist = Math.abs(elapsed - note.beatTime);
        if (dist < closestDist) {
          closestDist = dist;
          closest = note;
        }
      }

      if (!closest || closestDist > 200) {
        // 空击
        return;
      }

      closest.hit = true;
      if (closest.el) {
        closest.el.style.opacity = '0';
        setTimeout(() => closest.el && closest.el.remove(), 50);
      }

      totalHits++;
      let judge, cls, pts;
      if (closestDist < 40) {
        judge = 'PERFECT'; cls = 'hit-perfect'; pts = 100; perfects++;
      } else if (closestDist < 80) {
        judge = 'GREAT'; cls = 'hit-great'; pts = 70; greats++;
      } else {
        judge = 'GOOD'; cls = 'hit-good'; pts = 40; goods++;
      }

      combo++;
      if (combo > maxCombo) maxCombo = combo;
      const comboBonus = Math.floor(combo / 10) * 5;
      score += pts + comboBonus;

      playBeat(lane);
      showHitEffect(lane, judge, cls);
      updateHUD();
    }

    function missNote(note) {
      combo = 0;
      misses++;
      totalHits++;
      playMissSound();
      showHitEffect(note.lane, 'MISS', 'hit-miss');
      updateHUD();
      if (note.el) note.el.style.opacity = '0.3';
    }

    function showHitEffect(lane, text, cls) {
      const laneEl = lanes[lane];
      const rect = laneEl.getBoundingClientRect();
      const areaRect = gameArea.getBoundingClientRect();

      const ef = document.createElement('div');
      ef.className = `hit-effect ${cls}`;
      ef.textContent = text;
      ef.style.left = (rect.left - areaRect.left + rect.width / 2) + 'px';
      gameArea.appendChild(ef);
      setTimeout(() => ef.remove(), 600);
    }

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('combo').textContent = combo;
      document.getElementById('maxCombo').textContent = maxCombo;

      const comboEl = document.getElementById('combo');
      comboEl.classList.toggle('fire', combo >= 20);

      const acc = totalHits > 0
        ? ((perfects * 100 + greats * 70 + goods * 40) / (totalHits * 100) * 100).toFixed(1)
        : '100.0';
      document.getElementById('accuracy').textContent = acc + '%';
    }

    function endGame() {
      gameRunning = false;
      if (animFrame) cancelAnimationFrame(animFrame);

      const acc = totalHits > 0
        ? (perfects * 100 + greats * 70 + goods * 40) / (totalHits * 100) * 100
        : 0;

      let rank;
      if (acc >= 95 && misses <= 2) rank = '✨ S';
      else if (acc >= 85) rank = '🏆 A';
      else if (acc >= 70) rank = '🎯 B';
      else if (acc >= 50) rank = '👍 C';
      else rank = '💪 D';

      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalMaxCombo').textContent = maxCombo;
      document.getElementById('finalAccuracy').textContent = acc.toFixed(1) + '%';
      document.getElementById('resultRank').textContent = rank;
      document.getElementById('rPerfect').textContent = perfects;
      document.getElementById('rGreat').textContent = greats;
      document.getElementById('rGood').textContent = goods;
      document.getElementById('rMiss').textContent = misses;

      document.getElementById('resultScreen').classList.remove('hidden');
    }

    function backToStart() {
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
      notes.forEach(n => n.el && n.el.remove());
      notes = [];
    }

    // ─── 键盘 ───
    document.addEventListener('keydown', e => {
      const idx = LANE_KEYS.indexOf(e.key.toLowerCase());
      if (idx >= 0) {
        e.preventDefault();
        hitNote(idx);
      }
      if (e.code === 'Space' && !gameRunning && document.getElementById('startScreen').classList.contains('hidden')) {
        backToStart();
      }
    });

    // ─── 触控支持 ───
    keyHints.forEach((hint, i) => {
      hint.addEventListener('touchstart', e => { e.preventDefault(); hitNote(i); });
      hint.addEventListener('mousedown', e => { e.preventDefault(); hitNote(i); });
    });
  </script>
</body>
</html>
