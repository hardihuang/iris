<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🎧 白噪音專注器 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 10px 14px; display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 12px; margin-bottom: 8px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .app-title { font-size: 15px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .master-label { font-size: 11px; color: rgba(255,255,255,0.6); }
    .master-slider {
      width: 70px; -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2); outline: none;
    }
    .master-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #4ade80; cursor: pointer; box-shadow: 0 0 6px rgba(74,222,128,0.5);
    }

    /* 主網格區 */
    .main { flex: 1; display: flex; gap: 10px; overflow: hidden; }

    /* 音源網格 - 3行4列 */
    .sounds-grid {
      flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr);
      gap: 8px;
    }
    .sound-card {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 10px 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; transition: all 0.25s; position: relative;
      min-height: 0;
    }
    .sound-card:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }
    .sound-card.active {
      background: rgba(168,85,247,0.25); border-color: rgba(168,85,247,0.4);
      box-shadow: 0 0 15px rgba(168,85,247,0.25);
    }
    .sound-icon { font-size: 26px; margin-bottom: 2px; }
    .sound-name { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; }
    
    .slider-wrap { width: 100%; padding: 0 2px; margin-top: 2px; }
    .sound-slider {
      width: 100%; -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.15); outline: none;
    }
    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: #e9d5ff; cursor: pointer; box-shadow: 0 0 6px rgba(168,85,247,0.5);
      transition: all 0.2s;
    }
    .sound-card.active .sound-slider::-webkit-slider-thumb {
      background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6);
    }
    .vol-text { font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 1px; }

    /* 波形動畫條 */
    .wave-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      border-radius: 0 0 12px 12px; overflow: hidden;
    }
    .wave-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4ade80, #a855f7);
      transition: width 0.3s;
    }
    .sound-card.active .wave-bar-fill { animation: waveAnim 2s infinite ease-in-out; }
    @keyframes waveAnim {
      0%,100% { width: 25%; } 50% { width: 85%; }
    }

    /* 右側控制面板 */
    .side-panel {
      width: 165px; display: flex; flex-direction: column; gap: 8px;
    }

    .card {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px;
    }
    .card-title {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6);
      letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
    }

    /* 定時器按鈕 */
    .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .timer-btn {
      padding: 6px 0; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .timer-btn:hover { background: rgba(255,255,255,0.12); }
    .timer-btn.active { background: rgba(74,222,128,0.25); border-color: rgba(74,222,128,0.4); color: #4ade80; }
    .timer-display {
      text-align: center; margin-top: 8px; font-size: 20px; font-weight: 700;
      color: #4ade80; font-variant-numeric: tabular-nums;
    }
    .timer-display.off { color: rgba(255,255,255,0.3); }

    /* 場景按鈕 */
    .scene-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .scene-btn {
      padding: 6px 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.85);
      font-size: 10px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .scene-btn:hover { background: rgba(255,255,255,0.1); }
    .scene-icon { font-size: 14px; }

    /* Footer */
    .footer {
      margin-top: 8px; padding: 5px 12px;
      background: rgba(0,0,0,0.2); border-radius: 8px;
      font-size: 11px; color: rgba(255,255,255,0.55);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-left { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    .status-dot.active { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .active-count { color: #4ade80; font-weight: 700; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        <div class="app-title">🎧 白噪音專注器</div>
      </div>
      <div class="header-right">
        <span class="master-label">主音量</span>
        <input type="range" class="master-slider" id="masterVol" min="0" max="100" value="70">
      </div>
    </div>

    <div class="main">
      <!-- 音源網格 -->
      <div class="sounds-grid" id="soundsGrid"></div>

      <!-- 右側控制面板 -->
      <div class="side-panel">
        <!-- 定時關閉 -->
        <div class="card">
          <div class="card-title">⏱ 定時</div>
          <div class="timer-grid">
            <div class="timer-btn" onclick="setTimer(15)">15 分</div>
            <div class="timer-btn" onclick="setTimer(30)">30 分</div>
            <div class="timer-btn" onclick="setTimer(45)">45 分</div>
            <div class="timer-btn" onclick="setTimer(60)">60 分</div>
            <div class="timer-btn" onclick="setTimer(90)">90 分</div>
            <div class="timer-btn" onclick="setTimer(0)">關</div>
          </div>
          <div class="timer-display off" id="timerDisplay">--:--</div>
        </div>

        <!-- 快速場景 -->
        <div class="card" style="flex:1;">
          <div class="card-title">🎬 場景</div>
          <div class="scene-grid">
            <div class="scene-btn" onclick="loadScene('study')"><span class="scene-icon">📚</span>學習</div>
            <div class="scene-btn" onclick="loadScene('relax')"><span class="scene-icon">🌊</span>放鬆</div>
            <div class="scene-btn" onclick="loadScene('cafe')"><span class="scene-icon">☕</span>咖啡</div>
            <div class="scene-btn" onclick="loadScene('nature')"><span class="scene-icon">🌿</span>自然</div>
            <div class="scene-btn" onclick="loadScene('sleep')"><span class="scene-icon">😴</span>助眠</div>
            <div class="scene-btn" onclick="loadScene('focus')"><span class="scene-icon">🎯</span>專注</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="status-dot" id="statusDot"></div>
        <span>播放中：<span class="active-count" id="activeCount">0</span> 個音源</span>
      </div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    // ─── 音源定義 ───
    const SOUNDS = [
      { id: 'rain',      icon: '🌧️', name: '雨聲',     type: 'rain' },
      { id: 'thunder',   icon: '⛈️', name: '雷雨',     type: 'thunder' },
      { id: 'ocean',     icon: '🌊', name: '海浪',     type: 'ocean' },
      { id: 'wind',      icon: '💨', name: '風聲',     type: 'wind' },
      { id: 'fire',      icon: '🔥', name: '篝火',     type: 'fire' },
      { id: 'birds',     icon: '🐦', name: '鳥鳴',     type: 'birds' },
      { id: 'cafe',      icon: '☕', name: '咖啡廳',   type: 'cafe' },
      { id: 'keyboard',  icon: '⌨️', name: '打字聲',   type: 'keyboard' },
      { id: 'train',     icon: '🚂', name: '火車',     type: 'train' },
      { id: 'creek',     icon: '🏞️', name: '溪流',     type: 'creek' },
      { id: 'whitenoise',icon: '📻', name: '白噪音',   type: 'white' },
      { id: 'night',     icon: '🌙', name: '夜晚蟲鳴', type: 'night' },
    ];

    // 預設場景
    const SCENES = {
      study:  { rain: 40, cafe: 30, keyboard: 25 },
      relax:  { ocean: 60, birds: 30, wind: 20 },
      cafe:   { cafe: 60, rain: 25 },
      nature: { creek: 50, birds: 40, wind: 25 },
      sleep:  { rain: 35, night: 40, ocean: 25 },
      focus:  { whitenoise: 45, rain: 30 },
    };

    let audioCtx = null;
    let masterGain = null;
    let sources = {};
    let timerInterval = null;
    let timerRemain = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.7;
      masterGain.connect(audioCtx.destination);
    }

    // ─── 合成白噪音引擎（每種音色獨立濾波器 + 獨特算法）───
    function createNoiseSource(type) {
      initAudio();
      const sr = audioCtx.sampleRate;
      const bufferSize = sr * 4; // 4秒循環，更自然
      const buffer = audioCtx.createBuffer(2, bufferSize, sr);

      for (let ch = 0; ch < 2; ch++) {
        const d = buffer.getChannelData(ch);
        const offset = ch * 137; // 左右聲道略有差異，增加立體感
        switch(type) {

          case 'white': // 純白噪音 - 全頻段
            for (let i = 0; i < bufferSize; i++) d[i] = (Math.random() * 2 - 1) * 0.7;
            break;

          case 'rain': // 雨聲 - 密集小滴 + 偶爾大滴，高頻為主
            for (let i = 0; i < bufferSize; i++) {
              d[i] = (Math.random() * 2 - 1) * 0.15; // 底噪
              // 密集雨滴 (高頻 tick)
              if (Math.random() < 0.008) {
                const len = 30 + Math.random() * 60;
                const freq = 4000 + Math.random() * 6000;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * freq * Math.PI*2) * Math.exp(-j/15) * 0.2;
                }
              }
              // 偶爾大水滴 (低頻 plop)
              if (Math.random() < 0.0008) {
                const len = 200;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * (800 - j*2) * Math.PI*2) * Math.exp(-j/60) * 0.35;
                }
              }
            }
            break;

          case 'thunder': // 雷雨 - 雨底噪 + 低頻雷鳴 rumble
            for (let i = 0; i < bufferSize; i++) {
              d[i] = (Math.random() * 2 - 1) * 0.12;
              if (Math.random() < 0.005) d[i] += (Math.random() - 0.5) * 0.15; // 雨滴
              // 雷鳴：超低頻 rumble + 爆裂
              if (Math.random() < 0.00015) {
                const thunderLen = 8000 + Math.random() * 15000;
                for (let j = 0; j < Math.min(thunderLen, bufferSize - i); j++) {
                  const env = Math.exp(-j/5000) * (1 + Math.sin(j/sr * 0.5 * Math.PI*2) * 0.3);
                  d[i+j] += (Math.random() * 2 - 1) * env * 0.6;
                  d[i+j] += Math.sin(j/sr * (40 + Math.random()*30) * Math.PI*2) * env * 0.3;
                }
              }
            }
            break;

          case 'ocean': // 海浪 - 慢速起伏 + 浪花泡沫
            for (let i = 0; i < bufferSize; i++) {
              // 多層正弦調製，模擬浪潮節奏
              const wave1 = Math.sin(i/sr * 0.08 * Math.PI*2); // ~8秒一個大浪
              const wave2 = Math.sin(i/sr * 0.22 * Math.PI*2) * 0.4; // 小浪疊加
              const envelope = Math.max(0, (wave1 + wave2) * 0.5 + 0.3);
              d[i] = (Math.random() * 2 - 1) * envelope * 0.4;
              // 浪花高頻泡沫
              if (envelope > 0.5) {
                d[i] += (Math.random() * 2 - 1) * (envelope - 0.4) * 0.3;
              }
            }
            break;

          case 'wind': // 風聲 - 布朗噪音 + 慢速呼嘯
            { let v = 0, slow = 0;
              for (let i = 0; i < bufferSize; i++) {
                slow += (Math.random() * 2 - 1) * 0.002;
                slow *= 0.9998;
                v += (Math.random() * 2 - 1) * 0.08;
                v *= 0.995;
                const howl = Math.sin(i/sr * (1.5 + slow * 3) * Math.PI*2) * 0.1;
                d[i] = (v + howl + slow * 2) * 0.5;
              }
            }
            break;

          case 'fire': // 篝火 - 低頻嗡鳴 + 隨機噼啪爆裂
            for (let i = 0; i < bufferSize; i++) {
              // 低頻火焰底噪
              d[i] = (Math.random() * 2 - 1) * 0.08;
              d[i] += Math.sin(i/sr * 60 * Math.PI*2) * (0.03 + Math.random() * 0.02);
              // 噼啪聲 - 短促高頻爆裂
              if (Math.random() < 0.003) {
                const crackLen = 20 + Math.random() * 80;
                const crackFreq = 1500 + Math.random() * 3000;
                for (let j = 0; j < Math.min(crackLen, bufferSize - i); j++) {
                  d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/10) * 0.5;
                }
              }
              // 偶爾木頭斷裂 - 低頻 pop
              if (Math.random() < 0.0005) {
                for (let j = 0; j < Math.min(500, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * 200 * Math.PI*2) * Math.exp(-j/80) * 0.4;
                }
              }
            }
            break;

          case 'birds': // 鳥鳴 - 多種鳥叫：啁啾、顫音、短哨
            for (let i = 0; i < bufferSize; i++) {
              d[i] = 0;
              // 啁啾鳥 (上升音調)
              if (Math.random() < 0.0003) {
                const len = 400 + Math.random() * 600;
                const baseFreq = 2500 + Math.random() * 2000;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  const freq = baseFreq + (j/len) * 1500;
                  d[i+j] += Math.sin(j/sr * freq * Math.PI*2) * Math.exp(-j/(len*0.7)) * 0.25;
                }
              }
              // 顫音鳥 (快速顫動)
              if (Math.random() < 0.0002) {
                const len = 800 + Math.random() * 1200;
                const baseFreq = 3000 + Math.random() * 3000;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  const tremolo = Math.sin(j/sr * 30 * Math.PI*2) * 0.5 + 0.5;
                  d[i+j] += Math.sin(j/sr * baseFreq * Math.PI*2) * tremolo * Math.exp(-j/(len*0.8)) * 0.2;
                }
              }
              // 短哨鳥 (單音)
              if (Math.random() < 0.0004) {
                const len = 150 + Math.random() * 200;
                const freq = 4000 + Math.random() * 4000;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * freq * Math.PI*2) * Math.exp(-j/(len*0.5)) * 0.2;
                }
              }
            }
            break;

          case 'cafe': // 咖啡廳 - 低頻人聲嗡嗡 + 杯碟碰撞 + 遠處音樂
            for (let i = 0; i < bufferSize; i++) {
              // 人聲嗡嗡（帶通噪音 200-600Hz 感覺）
              d[i] = (Math.random() * 2 - 1) * 0.08;
              // 模擬多人交談的調製
              d[i] *= (0.7 + Math.sin(i/sr * 3.2 * Math.PI*2) * 0.15 + Math.sin(i/sr * 1.7 * Math.PI*2) * 0.15);
              // 杯碟碰撞 - 高頻金屬聲
              if (Math.random() < 0.001) {
                const freq = 3000 + Math.random() * 5000;
                for (let j = 0; j < Math.min(400, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * freq * Math.PI*2) * Math.exp(-j/60) * 0.15;
                }
              }
              // 遠處低頻音樂
              d[i] += Math.sin(i/sr * 110 * Math.PI*2) * 0.01 * (Math.sin(i/sr * 0.5 * Math.PI*2) * 0.5 + 0.5);
            }
            break;

          case 'keyboard': // 打字聲 - 真實機械鍵盤模擬
            { let lastClick = -2000; // 控制節奏間隔
              for (let i = 0; i < bufferSize; i++) {
                d[i] = 0;

                // 打字節奏：模擬真人打字（有快有慢，偶爾停頓）
                const timeSinceLast = i - lastClick;
                const isTypingBurst = Math.sin(i/sr * 0.4 * Math.PI*2) > -0.3; // 打字/停頓交替

                if (isTypingBurst && timeSinceLast > (sr * 0.06 + Math.random() * sr * 0.12)) {
                  lastClick = i;
                  const keyType = Math.random();

                  if (keyType < 0.6) {
                    // 普通字母鍵 — 清脆的 click（高頻短衝擊 + 回彈）
                    const clickFreq = 2800 + Math.random() * 1500;
                    const clickLen = Math.floor(sr * 0.008 + Math.random() * sr * 0.006);
                    for (let j = 0; j < Math.min(clickLen, bufferSize - i); j++) {
                      // 按下衝擊
                      d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/(sr*0.001)) * 0.5;
                      // 共振音色
                      d[i+j] += Math.sin(j/sr * clickFreq * Math.PI*2) * Math.exp(-j/(sr*0.003)) * 0.2;
                    }
                    // 回彈聲（稍延遲的第二次輕擊）
                    const bounceDelay = Math.floor(sr * 0.015 + Math.random() * sr * 0.01);
                    for (let j = 0; j < Math.min(Math.floor(sr*0.004), bufferSize - i - bounceDelay); j++) {
                      d[i+bounceDelay+j] += (Math.random() * 2 - 1) * Math.exp(-j/(sr*0.001)) * 0.15;
                    }

                  } else if (keyType < 0.85) {
                    // 空格鍵 — 低沉寬厚的 thud + 彈簧共振
                    const thudLen = Math.floor(sr * 0.04);
                    for (let j = 0; j < Math.min(thudLen, bufferSize - i); j++) {
                      d[i+j] += Math.sin(j/sr * 180 * Math.PI*2) * Math.exp(-j/(sr*0.012)) * 0.4;
                      d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/(sr*0.005)) * 0.25;
                      // 穩定器彈簧泛音
                      d[i+j] += Math.sin(j/sr * 450 * Math.PI*2) * Math.exp(-j/(sr*0.008)) * 0.1;
                    }

                  } else if (keyType < 0.93) {
                    // Enter / Backspace — 較重的按擊 + 金屬感
                    const hitLen = Math.floor(sr * 0.02);
                    const hitFreq = 1800 + Math.random() * 800;
                    for (let j = 0; j < Math.min(hitLen, bufferSize - i); j++) {
                      d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/(sr*0.002)) * 0.45;
                      d[i+j] += Math.sin(j/sr * hitFreq * Math.PI*2) * Math.exp(-j/(sr*0.006)) * 0.2;
                      d[i+j] += Math.sin(j/sr * (hitFreq*1.5) * Math.PI*2) * Math.exp(-j/(sr*0.004)) * 0.08;
                    }

                  } else {
                    // Shift / Ctrl — 輕柔的觸底聲
                    const softLen = Math.floor(sr * 0.012);
                    for (let j = 0; j < Math.min(softLen, bufferSize - i); j++) {
                      d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/(sr*0.002)) * 0.2;
                      d[i+j] += Math.sin(j/sr * 3500 * Math.PI*2) * Math.exp(-j/(sr*0.002)) * 0.08;
                    }
                  }
                }

                // 極微底噪（桌面環境聲）
                d[i] += (Math.random() * 2 - 1) * 0.005;
              }
            }
            break;

          case 'train': // 火車 - 有節奏的 clickety-clack + 低頻引擎嗡嗡
            for (let i = 0; i < bufferSize; i++) {
              // 引擎低頻嗡嗡
              d[i] = Math.sin(i/sr * 45 * Math.PI*2) * 0.06;
              d[i] += Math.sin(i/sr * 90 * Math.PI*2) * 0.03;
              // 車輪節奏 clickety-clack (~2Hz 的雙擊)
              const beatPhase = (i/sr * 1.8) % 1;
              if (beatPhase < 0.02 || (beatPhase > 0.15 && beatPhase < 0.17)) {
                d[i] += (Math.random() * 2 - 1) * 0.35;
              }
              // 鐵軌摩擦聲
              d[i] += (Math.random() * 2 - 1) * 0.04;
              // 車廂晃動
              d[i] += Math.sin(i/sr * 0.7 * Math.PI*2) * (Math.random() * 2 - 1) * 0.03;
            }
            break;

          case 'creek': // 溪流 - 流水聲 + 水花 + 石頭碰撞
            for (let i = 0; i < bufferSize; i++) {
              // 流水底噪（中高頻）
              const flow1 = Math.sin(i/sr * 0.3 * Math.PI*2) * 0.3 + 0.7;
              const flow2 = Math.sin(i/sr * 0.7 * Math.PI*2) * 0.2;
              d[i] = (Math.random() * 2 - 1) * 0.12 * (flow1 + flow2);
              // 水花聲（高頻噴濺）
              if (Math.random() < 0.003) {
                const splashLen = 100 + Math.random() * 200;
                for (let j = 0; j < Math.min(splashLen, bufferSize - i); j++) {
                  d[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/40) * 0.25;
                }
              }
              // 水滴落石（清脆 plop）
              if (Math.random() < 0.001) {
                for (let j = 0; j < Math.min(100, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * (1500 - j*5) * Math.PI*2) * Math.exp(-j/25) * 0.2;
                }
              }
            }
            break;

          case 'night': // 夜晚蟲鳴 - 蟋蟀持續顫音 + 遠處蛙鳴 + 偶爾貓頭鷹
            for (let i = 0; i < bufferSize; i++) {
              d[i] = (Math.random() * 2 - 1) * 0.015; // 極微底噪
              // 蟋蟀：持續高頻顫音 (~4500Hz 脈衝)
              const cricketEnv = Math.sin(i/sr * 25 * Math.PI*2) > 0 ? 1 : 0;
              d[i] += Math.sin(i/sr * 4500 * Math.PI*2) * cricketEnv * 0.06;
              // 第二隻蟋蟀（稍不同頻率和節奏）
              const cricket2 = Math.sin((i+offset*200)/sr * 22 * Math.PI*2) > 0.2 ? 1 : 0;
              d[i] += Math.sin(i/sr * 5200 * Math.PI*2) * cricket2 * 0.04;
              // 遠處蛙鳴（低頻短脈衝）
              if (Math.random() < 0.0004) {
                const len = 300 + Math.random() * 500;
                const frogFreq = 400 + Math.random() * 300;
                for (let j = 0; j < Math.min(len, bufferSize - i); j++) {
                  d[i+j] += Math.sin(j/sr * frogFreq * Math.PI*2) * Math.exp(-j/(len*0.6)) * 0.15;
                }
              }
              // 偶爾貓頭鷹 hoo-hoo
              if (Math.random() < 0.00005) {
                for (let k = 0; k < 2; k++) {
                  const start = k * 4000;
                  const hooFreq = 350;
                  for (let j = 0; j < Math.min(3000, bufferSize - i - start); j++) {
                    d[i+start+j] += Math.sin(j/sr * hooFreq * Math.PI*2) * Math.exp(-j/1200) * 0.12;
                  }
                }
              }
            }
            break;

          default:
            for (let i = 0; i < bufferSize; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
        }
      }

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;

      // 每種音色用不同的濾波器設置
      const filterSettings = {
        white:  { type: 'lowpass',  freq: 12000 },
        rain:   { type: 'highpass', freq: 800 },
        thunder:{ type: 'lowpass',  freq: 600 },
        ocean:  { type: 'lowpass',  freq: 1800 },
        wind:   { type: 'bandpass', freq: 500, Q: 0.5 },
        fire:   { type: 'lowpass',  freq: 2500 },
        birds:  { type: 'highpass', freq: 1500 },
        cafe:   { type: 'bandpass', freq: 800, Q: 0.3 },
        keyboard:{ type: 'highpass', freq: 500 },
        train:  { type: 'lowpass',  freq: 1200 },
        creek:  { type: 'bandpass', freq: 2000, Q: 0.4 },
        night:  { type: 'highpass', freq: 1000 },
      };

      const fs = filterSettings[type] || { type: 'lowpass', freq: 5000 };
      const filter = audioCtx.createBiquadFilter();
      filter.type = fs.type;
      filter.frequency.value = fs.freq;
      if (fs.Q) filter.Q.value = fs.Q;

      const gain = audioCtx.createGain();
      gain.gain.value = 0;

      source.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      source.start();

      return { source, gain, filter };
    }

    // ─── UI 初始化 ───
    function initUI() {
      const grid = document.getElementById('soundsGrid');
      SOUNDS.forEach(s => {
        grid.innerHTML += `
          <div class="sound-card" id="card-${s.id}" onclick="toggleSound('${s.id}')">
            <div class="sound-icon">${s.icon}</div>
            <div class="sound-name">${s.name}</div>
            <div class="slider-wrap">
              <input type="range" class="sound-slider" id="vol-${s.id}" min="0" max="100" value="50"
                onclick="event.stopPropagation()" oninput="setVolume('${s.id}', this.value)">
            </div>
            <div class="vol-text" id="voltxt-${s.id}">50%</div>
            <div class="wave-bar"><div class="wave-bar-fill"></div></div>
          </div>`;
      });
    }

    function toggleSound(id) {
      const card = document.getElementById('card-' + id);
      const sound = SOUNDS.find(s => s.id === id);

      if (sources[id]) {
        sources[id].gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        const src = sources[id];
        setTimeout(() => { try { src.source.stop(); } catch(e){} }, 400);
        delete sources[id];
        card.classList.remove('active');
      } else {
        initAudio();
        sources[id] = createNoiseSource(sound.type);
        const vol = parseInt(document.getElementById('vol-' + id).value) / 100;
        sources[id].gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.3);
        card.classList.add('active');
      }
      updateStatus();
    }

    function setVolume(id, val) {
      document.getElementById('voltxt-' + id).textContent = val + '%';
      if (sources[id]) {
        sources[id].gain.gain.linearRampToValueAtTime(val / 100, audioCtx.currentTime + 0.1);
      }
    }

    document.getElementById('masterVol').addEventListener('input', e => {
      if (masterGain) masterGain.gain.value = e.target.value / 100;
    });

    // ─── 場景 ───
    function loadScene(name) {
      Object.keys(sources).forEach(id => {
        sources[id].gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        const src = sources[id];
        setTimeout(() => { try { src.source.stop(); } catch(e){} }, 300);
        document.getElementById('card-' + id).classList.remove('active');
      });
      sources = {};

      setTimeout(() => {
        const scene = SCENES[name];
        if (!scene) return;
        Object.entries(scene).forEach(([id, vol]) => {
          document.getElementById('vol-' + id).value = vol;
          document.getElementById('voltxt-' + id).textContent = vol + '%';
          initAudio();
          const sound = SOUNDS.find(s => s.id === id);
          sources[id] = createNoiseSource(sound.type);
          sources[id].gain.gain.linearRampToValueAtTime(vol / 100, audioCtx.currentTime + 0.5);
          document.getElementById('card-' + id).classList.add('active');
        });
        updateStatus();
      }, 350);
    }

    // ─── 定時器 ───
    function setTimer(minutes) {
      document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      if (minutes === 0) {
        timerRemain = 0;
        document.getElementById('timerDisplay').textContent = '--:--';
        document.getElementById('timerDisplay').classList.add('off');
        return;
      }

      event.target.classList.add('active');
      timerRemain = minutes * 60;
      document.getElementById('timerDisplay').classList.remove('off');
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timerRemain--;
        updateTimerDisplay();
        if (timerRemain <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          Object.keys(sources).forEach(id => toggleSound(id));
          document.getElementById('timerDisplay').textContent = '00:00';
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerRemain / 60);
      const s = timerRemain % 60;
      document.getElementById('timerDisplay').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateStatus() {
      const count = Object.keys(sources).length;
      document.getElementById('activeCount').textContent = count;
      document.getElementById('statusDot').classList.toggle('active', count > 0);
    }

    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }

    initUI();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
