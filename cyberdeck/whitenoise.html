<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>🎧 白噪音專注器 - Echo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 800px; height: 480px; overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      color: #fff;
    }
    .container { width: 100%; height: 100%; padding: 14px 18px; display: flex; flex-direction: column; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; margin-bottom: 10px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .home-btn {
      color: #fff; text-decoration: none; font-size: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .app-title { font-size: 16px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .master-vol-label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .master-slider {
      width: 80px; -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2); outline: none;
    }
    .master-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #4ade80; cursor: pointer;
    }

    .main { flex: 1; display: flex; gap: 12px; overflow: hidden; }

    /* 音源网格 */
    .sounds-grid {
      flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .sound-card {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 12px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; transition: all 0.25s; position: relative;
    }
    .sound-card:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }
    .sound-card.active {
      background: rgba(168,85,247,0.3); border-color: rgba(168,85,247,0.5);
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
    }
    .sound-icon { font-size: 28px; }
    .sound-name { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    .sound-slider-wrap { width: 100%; padding: 0 4px; margin-top: 2px; }
    .sound-slider {
      width: 100%; -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.15); outline: none;
    }
    .sound-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: #e9d5ff; cursor: pointer; box-shadow: 0 0 6px rgba(168,85,247,0.5);
    }
    .sound-card.active .sound-slider::-webkit-slider-thumb { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
    .vol-text { font-size: 10px; color: rgba(255,255,255,0.4); }

    /* 波形动画 */
    .wave-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      border-radius: 0 0 12px 12px; overflow: hidden;
    }
    .wave-bar-fill {
      height: 100%; width: 0%; border-radius: 0 0 12px 12px;
      background: linear-gradient(90deg, #4ade80, #a855f7);
      transition: width 0.3s;
    }
    .sound-card.active .wave-bar-fill { animation: waveAnim 2s infinite; }
    @keyframes waveAnim {
      0% { width: 30%; } 50% { width: 100%; } 100% { width: 30%; }
    }

    /* 右侧面板 */
    .side-panel { width: 200px; display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px;
    }
    .card-title {
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6);
      letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    /* 定时器 */
    .timer-presets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .timer-btn {
      padding: 8px 0; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .timer-btn:hover { background: rgba(255,255,255,0.12); }
    .timer-btn.active { background: rgba(74,222,128,0.25); border-color: rgba(74,222,128,0.4); color: #4ade80; }
    .timer-display {
      text-align: center; margin-top: 10px; font-size: 22px; font-weight: 700;
      color: #4ade80; font-variant-numeric: tabular-nums;
    }
    .timer-display.off { color: rgba(255,255,255,0.3); }

    /* 预设场景 */
    .scene-list { display: flex; flex-direction: column; gap: 6px; }
    .scene-btn {
      padding: 8px 10px; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .scene-btn:hover { background: rgba(255,255,255,0.12); }
    .scene-icon { font-size: 16px; }

    /* 状态 */
    .status-card {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px; font-size: 12px; color: rgba(255,255,255,0.5);
    }
    .active-count { color: #4ade80; font-weight: 700; font-size: 14px; }

    .footer {
      margin-top: 10px; padding: 6px 14px;
      background: rgba(0,0,0,0.2); border-radius: 8px;
      font-size: 11px; color: rgba(255,255,255,0.5);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    .status-dot.active { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <a href="https://hardihuang.github.io/iris/cyberdeck2/" class="home-btn" title="返回桌面">🏠</a>
        <div class="app-title">🎧 白噪音專注器</div>
      </div>
      <div class="header-right">
        <span class="master-vol-label">主音量</span>
        <input type="range" class="master-slider" id="masterVol" min="0" max="100" value="70">
      </div>
    </div>

    <div class="main">
      <div class="sounds-grid" id="soundsGrid"></div>

      <div class="side-panel">
        <!-- 定时关闭 -->
        <div class="card">
          <div class="card-title">⏱ 定時關閉</div>
          <div class="timer-presets">
            <div class="timer-btn" onclick="setTimer(15)">15 分</div>
            <div class="timer-btn" onclick="setTimer(30)">30 分</div>
            <div class="timer-btn" onclick="setTimer(45)">45 分</div>
            <div class="timer-btn" onclick="setTimer(60)">60 分</div>
            <div class="timer-btn" onclick="setTimer(90)">90 分</div>
            <div class="timer-btn" onclick="setTimer(0)">取消</div>
          </div>
          <div class="timer-display off" id="timerDisplay">--:--</div>
        </div>

        <!-- 预设场景 -->
        <div class="card" style="flex:1;">
          <div class="card-title">🎬 快速場景</div>
          <div class="scene-list">
            <div class="scene-btn" onclick="loadScene('study')"><span class="scene-icon">📚</span> 深度學習</div>
            <div class="scene-btn" onclick="loadScene('relax')"><span class="scene-icon">🌊</span> 放鬆冥想</div>
            <div class="scene-btn" onclick="loadScene('cafe')"><span class="scene-icon">☕</span> 咖啡廳氛圍</div>
            <div class="scene-btn" onclick="loadScene('nature')"><span class="scene-icon">🌿</span> 大自然</div>
            <div class="scene-btn" onclick="loadScene('sleep')"><span class="scene-icon">😴</span> 助眠模式</div>
          </div>
        </div>

        <div class="status-card">
          播放中: <span class="active-count" id="activeCount">0</span> 個音源
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">準備就緒</span>
      </div>
      <div id="clock"></div>
    </div>
  </div>

  <script>
    // ─── 音源定義 ───
    const SOUNDS = [
      { id: 'rain',      icon: '🌧️', name: '雨聲',     type: 'rain' },
      { id: 'thunder',   icon: '⛈️', name: '雷雨',     type: 'thunder' },
      { id: 'ocean',     icon: '🌊', name: '海浪',     type: 'ocean' },
      { id: 'wind',      icon: '💨', name: '風聲',     type: 'wind' },
      { id: 'fire',      icon: '🔥', name: '篝火',     type: 'fire' },
      { id: 'birds',     icon: '🐦', name: '鳥鳴',     type: 'birds' },
      { id: 'cafe',      icon: '☕', name: '咖啡廳',   type: 'cafe' },
      { id: 'keyboard',  icon: '⌨️', name: '打字聲',   type: 'keyboard' },
      { id: 'train',     icon: '🚂', name: '火車',     type: 'train' },
      { id: 'creek',     icon: '🏞️', name: '溪流',     type: 'creek' },
      { id: 'whitenoise',icon: '📻', name: '白噪音',   type: 'white' },
      { id: 'night',     icon: '🌙', name: '夜晚蟲鳴', type: 'night' },
    ];

    // 预设场景
    const SCENES = {
      study:  { rain: 40, cafe: 30, keyboard: 20 },
      relax:  { ocean: 60, birds: 30, wind: 20 },
      cafe:   { cafe: 60, rain: 20 },
      nature: { creek: 50, birds: 40, wind: 25 },
      sleep:  { rain: 35, night: 40, ocean: 25 },
    };

    let audioCtx = null;
    let masterGain = null;
    let sources = {};
    let timerInterval = null;
    let timerRemain = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.7;
      masterGain.connect(audioCtx.destination);
    }

    // ─── 合成白噪音引擎 ───
    function createNoiseSource(type) {
      initAudio();
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);

      for (let ch = 0; ch < 2; ch++) {
        const data = buffer.getChannelData(ch);
        switch(type) {
          case 'white':
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            break;
          case 'rain':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * 0.3;
              if (Math.random() < 0.001) data[i] += (Math.random() - 0.5) * 0.8;
            }
            break;
          case 'thunder':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * 0.2;
              if (Math.random() < 0.0003) {
                for (let j = 0; j < Math.min(4000, bufferSize - i); j++) {
                  data[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/1500) * 0.7;
                }
              }
            }
            break;
          case 'ocean':
            for (let i = 0; i < bufferSize; i++) {
              const wave = Math.sin(i / audioCtx.sampleRate * 0.15 * Math.PI * 2);
              data[i] = (Math.random() * 2 - 1) * (0.2 + wave * 0.15);
            }
            break;
          case 'wind':
            let windVal = 0;
            for (let i = 0; i < bufferSize; i++) {
              windVal += (Math.random() * 2 - 1) * 0.1;
              windVal *= 0.998;
              data[i] = windVal + (Math.random() * 2 - 1) * 0.05;
            }
            break;
          case 'fire':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * 0.15;
              if (Math.random() < 0.01) data[i] += (Math.random() - 0.5) * 0.5;
            }
            break;
          case 'birds':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = 0;
              if (Math.random() < 0.0005) {
                const freq = 2000 + Math.random() * 4000;
                for (let j = 0; j < Math.min(800, bufferSize - i); j++) {
                  data[i+j] += Math.sin(j / audioCtx.sampleRate * freq * Math.PI * 2) * Math.exp(-j/200) * 0.3;
                }
              }
            }
            break;
          case 'cafe':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * 0.12;
              if (Math.random() < 0.002) data[i] += (Math.random() - 0.5) * 0.3;
            }
            break;
          case 'keyboard':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = 0;
              if (Math.random() < 0.002) {
                for (let j = 0; j < Math.min(300, bufferSize - i); j++) {
                  data[i+j] += (Math.random() * 2 - 1) * Math.exp(-j/50) * 0.4;
                }
              }
            }
            break;
          case 'train':
            for (let i = 0; i < bufferSize; i++) {
              const rhythm = Math.sin(i / audioCtx.sampleRate * 3 * Math.PI * 2);
              data[i] = (Math.random() * 2 - 1) * (0.1 + Math.abs(rhythm) * 0.12);
            }
            break;
          case 'creek':
            for (let i = 0; i < bufferSize; i++) {
              const flow = Math.sin(i / audioCtx.sampleRate * 0.8 * Math.PI * 2);
              data[i] = (Math.random() * 2 - 1) * (0.1 + flow * 0.08);
              if (Math.random() < 0.005) data[i] += (Math.random() - 0.5) * 0.4;
            }
            break;
          case 'night':
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * 0.03;
              if (Math.random() < 0.001) {
                const freq = 3000 + Math.random() * 3000;
                for (let j = 0; j < Math.min(1500, bufferSize - i); j++) {
                  data[i+j] += Math.sin(j / audioCtx.sampleRate * freq * Math.PI * 2) * Math.exp(-j/500) * 0.15;
                }
              }
            }
            break;
          default:
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
        }
      }

      // 低通滤波让声音更柔和
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = type === 'birds' || type === 'keyboard' ? 8000 : 3000;

      const gain = audioCtx.createGain();
      gain.gain.value = 0;

      source.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      source.start();

      return { source, gain, filter };
    }

    // ─── UI ───
    function initUI() {
      const grid = document.getElementById('soundsGrid');
      SOUNDS.forEach(s => {
        grid.innerHTML += `
          <div class="sound-card" id="card-${s.id}" onclick="toggleSound('${s.id}')">
            <div class="sound-icon">${s.icon}</div>
            <div class="sound-name">${s.name}</div>
            <div class="sound-slider-wrap">
              <input type="range" class="sound-slider" id="vol-${s.id}" min="0" max="100" value="50"
                onclick="event.stopPropagation()" oninput="setVolume('${s.id}', this.value)">
            </div>
            <div class="vol-text" id="voltxt-${s.id}">50%</div>
            <div class="wave-bar"><div class="wave-bar-fill"></div></div>
          </div>`;
      });
    }

    function toggleSound(id) {
      const card = document.getElementById('card-' + id);
      const sound = SOUNDS.find(s => s.id === id);

      if (sources[id]) {
        // 关闭
        sources[id].gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        const src = sources[id];
        setTimeout(() => { try { src.source.stop(); } catch(e){} }, 400);
        delete sources[id];
        card.classList.remove('active');
      } else {
        // 开启
        initAudio();
        sources[id] = createNoiseSource(sound.type);
        const vol = parseInt(document.getElementById('vol-' + id).value) / 100;
        sources[id].gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.3);
        card.classList.add('active');
      }
      updateStatus();
    }

    function setVolume(id, val) {
      document.getElementById('voltxt-' + id).textContent = val + '%';
      if (sources[id]) {
        sources[id].gain.gain.linearRampToValueAtTime(val / 100, audioCtx.currentTime + 0.1);
      }
    }

    // 主音量
    document.getElementById('masterVol').addEventListener('input', e => {
      if (masterGain) masterGain.gain.value = e.target.value / 100;
    });

    // ─── 场景 ───
    function loadScene(name) {
      // 先全部关闭
      Object.keys(sources).forEach(id => {
        sources[id].gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        const src = sources[id];
        setTimeout(() => { try { src.source.stop(); } catch(e){} }, 300);
        document.getElementById('card-' + id).classList.remove('active');
      });
      sources = {};

      // 加载场景
      setTimeout(() => {
        const scene = SCENES[name];
        if (!scene) return;
        Object.entries(scene).forEach(([id, vol]) => {
          document.getElementById('vol-' + id).value = vol;
          document.getElementById('voltxt-' + id).textContent = vol + '%';
          initAudio();
          const sound = SOUNDS.find(s => s.id === id);
          sources[id] = createNoiseSource(sound.type);
          sources[id].gain.gain.linearRampToValueAtTime(vol / 100, audioCtx.currentTime + 0.5);
          document.getElementById('card-' + id).classList.add('active');
        });
        updateStatus();
      }, 350);
    }

    // ─── 定时 ───
    function setTimer(minutes) {
      document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      if (minutes === 0) {
        timerRemain = 0;
        document.getElementById('timerDisplay').textContent = '--:--';
        document.getElementById('timerDisplay').classList.add('off');
        return;
      }

      event.target.classList.add('active');
      timerRemain = minutes * 60;
      document.getElementById('timerDisplay').classList.remove('off');
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timerRemain--;
        updateTimerDisplay();
        if (timerRemain <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          // 停止所有音源
          Object.keys(sources).forEach(id => toggleSound(id));
          document.getElementById('timerDisplay').textContent = '00:00';
          document.getElementById('statusText').textContent = '定時結束，已停止播放';
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerRemain / 60);
      const s = timerRemain % 60;
      document.getElementById('timerDisplay').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    // ─── 状态 ───
    function updateStatus() {
      const count = Object.keys(sources).length;
      document.getElementById('activeCount').textContent = count;
      document.getElementById('statusDot').classList.toggle('active', count > 0);
      document.getElementById('statusText').textContent = count > 0 ? `${count} 個音源播放中` : '準備就緒';
    }

    // ─── 时钟 ───
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }

    // 初始化
    initUI();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
